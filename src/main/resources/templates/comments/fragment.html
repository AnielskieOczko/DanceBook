<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<div th:fragment="commentSection" id="comment-container" class="w-full">
    
    <!-- Update count in header via OOB -->
    <span id="comment-count-header" hx-swap-oob="true" class="ml-auto bg-indigo-100 text-indigo-700 text-xs font-bold px-2 py-0.5 rounded-full" th:text="${commentCount}">0</span>

    <!-- Comment Form -->
    <form th:attr="hx-post=@{/materials/{id}/comments(id=${materialId})}"
          hx-target="#comment-container" 
          hx-swap="outerHTML" 
          class="mb-8">
        <div class="relative group">
            <textarea id="comment-textarea" name="content" required
                      class="w-full border-gray-200 rounded-xl shadow-sm focus:ring-indigo-500 focus:border-indigo-500 p-4 pr-12 text-sm transition bg-white" 
                      rows="3" placeholder="Add a comment... (Try typing :) or :D)"></textarea>
            
            <!-- Simple Emoji Helper -->
            <div class="absolute top-4 right-4 flex flex-col items-center gap-2">
                <button id="emoji-toggle" type="button"
                        class="text-gray-400 hover:text-indigo-500 transition text-xl" title="Add Emoji">
                    ✨
                </button>
                <div id="emoji-grid" class="hidden absolute top-8 right-0 bg-white border border-gray-200 shadow-xl rounded-lg p-2 grid grid-cols-4 gap-1 z-50 w-40">
                    <button type="button" th:each="emoji : ${ {'💃', '🕺', '🔥', '✨', '👏', '😊', '😍', '🙌'} }" 
                            th:text="${emoji}" 
                            th:data-emoji="${emoji}"
                            class="emoji-btn hover:bg-gray-100 p-1 rounded text-lg"></button>
                </div>
            </div>

            <div class="absolute bottom-3 right-3 opacity-0 group-focus-within:opacity-100 transition">
                <button type="submit" class="bg-indigo-600 text-white px-5 py-2 rounded-lg hover:bg-indigo-700 text-sm font-semibold shadow-sm transition transform hover:scale-105">
                    Post Comment
                </button>
            </div>
        </div>
    </form>

    <!-- Comments List -->
    <div class="space-y-6">
        <div th:if="${#lists.isEmpty(comments)}" class="text-center py-10 bg-white rounded-xl border border-dashed border-gray-200">
            <div class="text-4xl mb-3">💬</div>
            <p class="text-gray-500 font-medium">No comments yet. Be the first to start the discussion!</p>
        </div>
        
        <div th:each="comment : ${comments}" th:id="'comment-' + ${comment.id}" class="comment-item flex space-x-4 p-5 bg-white rounded-2xl border border-gray-100 shadow-sm transition hover:shadow-md group">
            <div class="flex-shrink-0">
                <div class="w-10 h-10 rounded-full bg-indigo-100 flex items-center justify-center text-indigo-700 font-bold text-lg" 
                     th:text="${#strings.toUpperCase(#strings.substring(comment.user.displayName ?: comment.user.username, 0, 1))}">U</div>
            </div>
            
            <div class="flex-1 min-w-0">
                <div class="flex items-center justify-between mb-1">
                    <h3 class="text-sm font-bold text-gray-900" th:text="${comment.user.displayName ?: comment.user.username}">User</h3>
                    <div class="flex items-center gap-3">
                        <p class="text-xs text-gray-400" th:text="${#temporals.format(comment.createdAt, 'dd MMM yyyy HH:mm')}">Date</p>
                        
                        <div th:if="${comment.user.username == currentUsername}">
                            <button th:attr="hx-delete=@{/comments/{id}(id=${comment.id})}"
                                    hx-confirm="Are you sure you want to delete this comment?"
                                    th:hx-target="'#comment-' + ${comment.id}"
                                    hx-swap="outerHTML"
                                    class="text-gray-300 hover:text-red-500 transition p-1">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                            </button>
                        </div>
                    </div>
                </div>
                <!-- UTF-8 Emojis will render here safely -->
                <p class="text-sm text-gray-700 leading-relaxed whitespace-pre-wrap break-words" th:text="${comment.content}">Content</p>
            </div>
        </div>
    </div>
</div>

<!-- Fragment for deletion response -->
<span th:fragment="countUpdateOobOnly" id="comment-count-header" hx-swap-oob="true" 
      class="ml-auto bg-indigo-100 text-indigo-700 text-xs font-bold px-2 py-0.5 rounded-full" 
      th:text="${commentCount}">0</span>

</body>
</html>
