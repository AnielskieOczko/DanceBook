<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in · DanceBook</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link th:href="@{/css/output.css}" rel="stylesheet">
</head>
<body class="bg-background min-h-screen flex flex-col items-center justify-center px-4">

    <!-- Logo & Brand -->
    <div class="text-center mb-8">
        <div class="flex items-center justify-center gap-3 mb-3">
            <div class="w-12 h-12 rounded-card bg-primary flex items-center justify-center shadow-warm-sm">
                <svg class="w-7 h-7 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
                    <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
                </svg>
            </div>
            <h1 class="font-heading font-bold text-3xl text-text-primary">DanceBook</h1>
        </div>
        <p class="text-text-secondary text-sm">Your personal dance library</p>
    </div>

    <!-- Sign In Card -->
    <div class="card p-8 w-full max-w-md shadow-warm-md">
        <h2 class="font-heading font-bold text-xl text-text-primary mb-6">Sign in</h2>

        <!-- Error message -->
        <div th:if="${param.error}" class="mb-4 p-3 rounded-button bg-danger-soft text-danger text-sm font-medium flex items-center gap-2">
            <svg class="w-4 h-4 flex-shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
            Invalid username or password
        </div>

        <!-- Logout message -->
        <div th:if="${param.logout}" class="mb-4 p-3 rounded-button bg-success-soft text-success text-sm font-medium flex items-center gap-2">
            <svg class="w-4 h-4 flex-shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
            You have been logged out
        </div>

        <!-- Login Form -->
        <form th:action="@{/login}" method="post" class="space-y-5">
            <div>
                <label for="username" class="form-label">Username</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <svg class="w-5 h-5 text-text-secondary" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                    </div>
                    <input id="username" name="username" type="text" required
                           class="form-input pl-10" placeholder="Enter your username">
                </div>
            </div>

            <div>
                <label for="password" class="form-label">Password</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <svg class="w-5 h-5 text-text-secondary" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                    </div>
                    <input id="password" name="password" type="password" required
                           class="form-input pl-10" placeholder="Enter your password">
                </div>
            </div>

            <div class="flex items-center justify-between">
                <label class="flex items-center gap-2 cursor-pointer">
                    <input type="checkbox" name="remember-me" class="rounded border-border text-primary focus:ring-primary">
                    <span class="text-sm text-text-secondary">Remember me</span>
                </label>
            </div>

            <button type="submit" class="btn-primary w-full justify-center text-base py-3">
                Sign in
            </button>
        </form>

        <!-- Divider -->
        <div class="relative my-6">
            <div class="absolute inset-0 flex items-center">
                <div class="w-full border-t border-border"></div>
            </div>
            <div class="relative flex justify-center text-sm">
                <span class="px-3 bg-surface text-text-secondary">Or continue with</span>
            </div>
        </div>

        <!-- Google OAuth -->
        <a href="/oauth2/authorization/google" class="btn-outline w-full justify-center">
            <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none">
                <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
                <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
            </svg>
            Sign in with Google
        </a>
    </div>

    <!-- Footer -->
    <p class="mt-8 text-xs text-text-secondary">DanceBook · Made with <span class="text-danger">&#10084;</span></p>

</body>
</html>
