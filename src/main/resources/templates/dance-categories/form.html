<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: html(content=~{::main})}">

<main class="max-w-xl mx-auto bg-white p-8 rounded-lg shadow-md border border-gray-200 mt-8">
  <div class="mb-6 border-b border-gray-200 pb-4">
    <h1 class="text-3xl font-bold text-indigo-600" th:text="${danceCategoryId == null ? 'New Category' : 'Edit Category'}">Form Title</h1>
  </div>

  <form th:action="${danceCategoryId == null ? '/dance-categories' : '/dance-categories/' + danceCategoryId}" 
        th:object="${danceCategory}" method="post" class="space-y-6">

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Name *</label>
      <input type="text" th:field="*{name}" 
             class="w-full px-4 py-2 border rounded-md focus:ring-indigo-500 focus:border-indigo-500 shadow-sm"
             th:classappend="${#fields.hasErrors('name')} ? 'border-red-500' : 'border-gray-300'"/>
      <p th:if="${#fields.hasErrors('name')}" th:errors="*{name}" class="mt-1 text-sm text-red-600"></p>
    </div>

    <div class="flex justify-end space-x-3 pt-6 border-t border-gray-200">
      <a href="/dance-categories" class="px-4 py-2 border border-gray-300 rounded-md text-gray-700 hover:bg-gray-50 font-medium transition">
        Cancel
      </a>
      <button type="submit" class="px-4 py-2 bg-indigo-600 text-white rounded-md hover:bg-indigo-700 font-medium transition shadow-sm">
        Save Category
      </button>
    </div>
  </form>
</main>
</html>
