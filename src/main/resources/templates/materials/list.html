<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: html(content=~{::section})}">

<section th:with="activeNav='materials'" class="space-y-lg">

    <!-- Search & Filter Section -->
    <section>
        <form id="filterForm" th:hx-get="@{/materials}" hx-target="#materials-grid" hx-swap="outerHTML" hx-trigger="submit, change from:input[type='checkbox']" hx-push-url="false">
            <div class="relative max-w-3xl mb-md group">
                <span class="material-symbols-outlined absolute left-0 top-1/2 -translate-y-1/2 text-on-surface-variant pointer-events-none group-focus-within:text-primary transition-colors">search</span>
                <input type="text" name="nameSearch" th:value="${selectedNameSearch}"
                       class="w-full bg-transparent border-0 border-b border-outline-variant focus:ring-0 focus:border-primary pb-sm pl-[36px] text-body-lg font-body-lg text-on-surface placeholder:text-on-surface-variant transition-colors outline-none"
                       placeholder="Search choreography, styles, or keywords..."
                       hx-trigger="keyup changed delay:300ms" th:hx-get="@{/materials}" hx-target="#materials-grid" hx-swap="outerHTML" hx-include="#filterForm">
            </div>

            <div class="flex overflow-x-auto gap-sm scrollbar-hide py-2">
                <!-- All Materials Pill -->
                <label class="cursor-pointer">
                    <input type="radio" name="categoryIds" value="" class="hidden peer"
                           th:checked="${selectedCategoryIds == null || #lists.isEmpty(selectedCategoryIds)}"
                           th:hx-get="@{/materials}" hx-target="#materials-grid" hx-swap="outerHTML" hx-include="#filterForm">
                    <span class="px-4 py-2 rounded-full whitespace-nowrap text-label-sm font-label-sm transition-all peer-checked:bg-primary-fixed peer-checked:text-on-primary-fixed bg-surface-container text-on-surface hover:bg-surface-container-high">
                        All Materials
                    </span>
                </label>

                <!-- Category Pills -->
                <label th:each="c : ${danceCategories}" class="cursor-pointer">
                    <input type="radio" name="categoryIds" th:value="${c.id}" class="hidden peer"
                           th:checked="${selectedCategoryIds != null && #lists.contains(selectedCategoryIds, c.id)}"
                           th:hx-get="@{/materials}" hx-target="#materials-grid" hx-swap="outerHTML" hx-include="#filterForm">
                    <span class="px-4 py-2 rounded-full whitespace-nowrap text-label-sm font-label-sm transition-all peer-checked:bg-primary-fixed peer-checked:text-on-primary-fixed bg-surface-container text-on-surface hover:bg-surface-container-high"
                          th:text="${c.name}">Category</span>
                </label>
            </div>
        </form>
    </section>

    <!-- Materials Grid (HTMX swappable) -->
    <div th:fragment="materialsTable" id="materials-grid" class="space-y-gutter">
        <div th:if="${#lists.isEmpty(materials)}" class="empty-state">
            <div class="empty-state-icon">
                <span class="material-symbols-outlined text-4xl text-outline">search_off</span>
            </div>
            <h3 class="empty-state-title">No movements found</h3>
            <p class="empty-state-text">Your library is quiet. Adjust your filters or add a new material to begin.</p>
            <a href="/materials/new" class="btn-primary">Import first material</a>
        </div>

        <div th:if="${!#lists.isEmpty(materials)}" class="grid grid-cols-1 md:grid-cols-12 gap-gutter">
            <!-- Featured Card (First item, if not filtered by search) -->
            <article th:if="${selectedNameSearch == null || selectedNameSearch == ''}"
                     th:with="m=${materials[0]}"
                     class="md:col-span-8 group relative rounded-xl overflow-hidden bg-surface border border-outline-variant hover:shadow-ambient hover:-translate-y-[2px] transition-all duration-300 h-[400px] cursor-pointer">
                <a th:href="@{/materials/{id}(id=${m.id})}" class="absolute inset-0 block">
                    <div class="absolute inset-0 bg-surface-container-highest flex items-center justify-center">
                        <span class="material-symbols-outlined text-6xl text-outline/20">movie</span>
                    </div>
                    <div class="absolute inset-0 bg-gradient-to-t from-black/70 via-black/20 to-transparent"></div>
                    <div class="absolute bottom-0 left-0 p-margin w-full text-white">
                        <span th:if="${m.danceType != null}" class="text-label-sm font-label-sm tracking-wider uppercase mb-xs block text-primary-fixed" th:text="${m.danceType.name}">Style</span>
                        <h2 class="text-headline-lg font-headline-lg text-white mb-sm" th:text="${m.name}">Material Name</h2>
                        <p th:if="${m.description}" class="text-body-md font-body-md text-white/80 line-clamp-2 max-w-xl" th:text="${m.description}">Description</p>
                    </div>
                </a>
            </article>

            <!-- Standard Cards -->
            <article th:each="m, iter : ${materials}"
                     th:if="${(selectedNameSearch != null && selectedNameSearch != '') || iter.index > 0}"
                     class="md:col-span-4 group relative rounded-xl overflow-hidden bg-surface border border-outline-variant hover:shadow-ambient hover:-translate-y-[2px] transition-all duration-300 h-[320px] cursor-pointer">
                <a th:href="@{/materials/{id}(id=${m.id})}" class="absolute inset-0 block">
                    <div class="absolute inset-0 bg-surface-container-highest flex items-center justify-center">
                        <span class="material-symbols-outlined text-4xl text-outline/20">movie</span>
                    </div>
                    <div class="absolute inset-0 bg-gradient-to-t from-black/70 to-transparent"></div>
                    <div class="absolute bottom-0 left-0 p-6 w-full text-white">
                        <span th:if="${m.danceType != null}" class="text-label-sm font-label-sm tracking-wider uppercase mb-xs block text-white/70" th:text="${m.danceType.name}">Style</span>
                        <h2 class="text-headline-md font-headline-md text-white mb-xs" th:text="${m.name}">Material Name</h2>
                        <div class="flex items-center gap-2 mt-sm text-white/80" th:if="${m.rating != null && m.rating > 0}">
                            <span class="material-symbols-outlined text-[16px]" style="font-variation-settings: &quot;FILL&quot; 1;">star</span>
                            <span class="text-label-sm font-label-sm" th:text="${m.rating}">5</span>
                        </div>
                    </div>
                </a>
            </article>
        </div>
    </div>

</section>
</html>
