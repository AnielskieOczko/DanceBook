<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: html(content=~{::main})}">

<main class="max-w-4xl mx-auto bg-white p-6 rounded-lg shadow-md border border-gray-200 mt-8">
  <div class="flex justify-between items-center mb-6">
    <h1 class="text-3xl font-bold text-indigo-600">Materials 💃🕺</h1>
    <a href="/materials/new" class="bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2 px-4 rounded transition shadow-sm">
      + New Material
    </a>
  </div>

  <!-- HTMX Filter Form -->
  <form id="filterForm" hx-get="/materials" hx-target="#materialsTable" hx-trigger="change, input delay:300ms from:#nameSearch"
        class="mb-6 bg-gray-50 p-4 rounded-lg border border-gray-100 shadow-sm space-y-4">

    <!-- Name search -->
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Search by Name</label>
      <input type="text" id="nameSearch" name="nameSearch" th:value="${selectedNameSearch}"
             placeholder="e.g. waltz, natural turn..."
             class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-indigo-500 focus:border-indigo-500 text-sm"/>
    </div>

    <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
      <!-- Dance Types (multi-select checkboxes) -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">Dance Types</label>
        <div class="max-h-40 overflow-y-auto space-y-1 bg-white rounded-md border border-gray-200 p-2">
          <label th:each="type : ${danceTypes}" class="flex items-center gap-2 text-sm text-gray-700 hover:bg-gray-50 px-1 py-0.5 rounded cursor-pointer">
            <input type="checkbox" name="typeIds" th:value="${type.id}"
                   th:checked="${#lists.contains(selectedTypeIds, type.id)}"
                   class="rounded border-gray-300 text-indigo-600 focus:ring-indigo-500"/>
            <span th:text="${type.name}">Type</span>
          </label>
        </div>
      </div>

      <!-- Categories (multi-select checkboxes) -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">Categories</label>
        <div class="max-h-40 overflow-y-auto space-y-1 bg-white rounded-md border border-gray-200 p-2">
          <label th:each="cat : ${danceCategories}" class="flex items-center gap-2 text-sm text-gray-700 hover:bg-gray-50 px-1 py-0.5 rounded cursor-pointer">
            <input type="checkbox" name="categoryIds" th:value="${cat.id}"
                   th:checked="${#lists.contains(selectedCategoryIds, cat.id)}"
                   class="rounded border-gray-300 text-indigo-600 focus:ring-indigo-500"/>
            <span th:text="${cat.name}">Category</span>
          </label>
        </div>
      </div>

      <!-- Min Rating -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">Min Rating</label>
        <select name="minRating" class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-indigo-500 focus:border-indigo-500 bg-white text-sm cursor-pointer transition">
          <option value="">Any Rating</option>
          <option value="5" th:selected="${selectedMinRating == 5}">5 Stars</option>
          <option value="4" th:selected="${selectedMinRating == 4}">4+ Stars</option>
          <option value="3" th:selected="${selectedMinRating == 3}">3+ Stars</option>
          <option value="2" th:selected="${selectedMinRating == 2}">2+ Stars</option>
          <option value="1" th:selected="${selectedMinRating == 1}">1+ Star</option>
        </select>
      </div>
    </div>
  </form>

  <!-- Wrapping the table inside an HTMX target fragment -->
  <div id="materialsTable" th:fragment="materialsTable" class="overflow-x-auto">
    <table class="w-full text-left border-collapse">
      <thead>
      <tr class="bg-gray-100 border-b border-gray-200 text-gray-700">
        <th class="p-3 font-semibold rounded-tl-lg">Name</th>
        <th class="p-3 font-semibold">Dance Type</th>
        <th class="p-3 font-semibold">Category</th>
        <th class="p-3 font-semibold">Rating</th>
        <th class="p-3 font-semibold text-right rounded-tr-lg">Actions</th>
      </tr>
      </thead>
      <tbody>
      <!-- Loop over our model variable ${materials} -->
      <tr th:each="material : ${materials}" class="border-b border-gray-100 hover:bg-gray-50 transition">
        <td class="p-3 font-medium text-gray-900">
          <a th:href="@{/materials/{id}(id=${material.id})}" th:text="${material.name}" class="text-indigo-600 hover:text-indigo-800 hover:underline">Name</a>
        </td>
        
        <td class="p-3">
          <span th:if="${material.danceType != null}" th:text="${material.danceType.name}" class="bg-indigo-100 text-indigo-800 text-xs px-2 py-1 rounded"></span>
          <span th:if="${material.danceType == null}" class="text-gray-400 text-sm">-</span>
        </td>
        
        <td class="p-3">
          <span th:if="${material.danceCategory != null}" th:text="${material.danceCategory.name}" class="bg-emerald-100 text-emerald-800 text-xs px-2 py-1 rounded"></span>
          <span th:if="${material.danceCategory == null}" class="text-gray-400 text-sm">-</span>
        </td>
        
        <td class="p-3">
          <div class="flex flex-col gap-1">
              <div class="flex items-center gap-1">
                  <span th:text="${material.rating ?: '-'}" class="font-medium text-gray-700"></span>
                  <span th:if="${material.rating != null}" class="text-yellow-400">★</span>
              </div>
              <div class="flex items-center gap-1 text-xs text-gray-400">
                  <span>💬</span>
                  <span th:text="${material.commentCount}">0</span>
              </div>
          </div>
        </td>
        
        <td class="p-3 text-right">
          <a th:href="@{/materials/{id}/edit(id=${material.id})}" class="text-indigo-600 hover:text-indigo-800 font-medium mr-3 transition">Edit</a>
          <!-- Delete button mapping -->
          <form th:action="@{/materials/{id}/delete(id=${material.id})}" method="post" class="inline">
            <button type="submit" class="text-red-500 hover:text-red-700 font-medium transition cursor-pointer" onclick="return confirm('Are you sure you want to delete this material?')">Delete</button>
          </form>
        </td>
      </tr>
      
      <!-- Empty state handling -->
      <tr th:if="${#lists.isEmpty(materials)}">
        <td colspan="5" class="p-8 text-center text-gray-500 bg-gray-50 italic">
          No materials found. Time to add your first dance move!
        </td>
      </tr>
      </tbody>
    </table>
  </div>
</main>
</html>
