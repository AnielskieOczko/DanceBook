<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: html(content=~{::section})}">

<section th:with="activeNav='dance-types'">

    <div class="page-header">
        <h1 class="page-title" th:text="${danceTypeId == null ? 'New Dance Style' : 'Edit Dance Style'}">Form Title</h1>
    </div>

    <form th:action="${danceTypeId == null ? '/dance-types' : '/dance-types/' + danceTypeId}"
          th:object="${danceType}" method="post" class="card p-6 md:p-8 space-y-6 max-w-lg">

        <div>
            <label for="typeName" class="form-label">Name *</label>
            <input id="typeName" type="text" th:field="*{name}" required class="form-input"
                   th:classappend="${#fields.hasErrors('name')} ? 'border-danger ring-1 ring-danger' : ''"
                   placeholder="e.g. Waltz, Tango, Foxtrot...">
            <p th:if="${#fields.hasErrors('name')}" th:errors="*{name}" class="form-error"></p>
        </div>

        <div>
            <label for="categoryId" class="form-label">Category *</label>
            <select id="categoryId" th:field="*{categoryId}" class="form-select" required>
                <option value="">-- Select Category --</option>
                <option th:each="cat : ${danceCategories}" th:value="${cat.id}" th:text="${cat.name}"></option>
            </select>
            <p th:if="${#fields.hasErrors('categoryId')}" th:errors="*{categoryId}" class="form-error"></p>
        </div>

        <div class="flex justify-end gap-3 pt-4 border-t border-border">
            <a href="/dance-types" class="btn-outline">Cancel</a>
            <button type="submit" class="btn-primary">Save Style</button>
        </div>
    </form>

</section>
</html>
