<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: html(content=~{::section})}">

<section th:with="activeNav='materials'">

    <!-- Page Header -->
    <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 mb-6">
        <div class="page-header mb-0">
            <h1 class="page-title">Material Library</h1>
            <p class="page-subtitle" th:text="${#lists.size(materials)} + ' materials'">0 materials</p>
        </div>
        <a href="/materials/new" class="btn-primary">
            <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Add Material
        </a>
    </div>

    <!-- Search & Filters -->
    <div class="card p-4 mb-6 space-y-4">
        <form id="filterForm" th:hx-get="@{/materials}" hx-target="#materials-grid" hx-swap="outerHTML" hx-trigger="submit, change from:select" hx-push-url="false">
            <!-- Search Bar -->
            <div class="relative mb-4">
                <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
                    <svg class="w-5 h-5 text-text-secondary" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                </div>
                <input type="text" name="nameSearch" th:value="${selectedNameSearch}" placeholder="Search materials..."
                       class="form-input pl-11" hx-trigger="keyup changed delay:300ms" th:hx-get="@{/materials}" hx-target="#materials-grid" hx-swap="outerHTML" hx-include="#filterForm">
            </div>

            <!-- Filter Row -->
            <div class="flex flex-wrap gap-3">
                <select name="typeIds" multiple class="form-select text-sm max-w-[200px]">
                    <option value="" disabled>Dance Style</option>
                    <option th:each="t : ${danceTypes}" th:value="${t.id}" th:text="${t.name}"
                            th:selected="${selectedTypeIds != null && #lists.contains(selectedTypeIds, t.id)}">Style</option>
                </select>
                <select name="categoryIds" multiple class="form-select text-sm max-w-[200px]">
                    <option value="" disabled>Category</option>
                    <option th:each="c : ${danceCategories}" th:value="${c.id}" th:text="${c.name}"
                            th:selected="${selectedCategoryIds != null && #lists.contains(selectedCategoryIds, c.id)}">Category</option>
                </select>
                <select name="minRating" class="form-select text-sm max-w-[150px]">
                    <option value="">Min Rating</option>
                    <option th:each="r : ${#numbers.sequence(1,5)}" th:value="${r}" th:text="${r} + '+ stars'"
                            th:selected="${selectedMinRating != null && selectedMinRating == r}">Rating</option>
                </select>
                <button type="submit" class="btn-secondary btn-sm">
                    <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>
                    Filter
                </button>
                <a href="/materials" class="btn-ghost btn-sm text-xs">Clear</a>
            </div>
        </form>
    </div>

    <!-- Materials Grid (HTMX swappable) -->
    <div th:fragment="materialsTable" id="materials-grid">
        <div th:if="${#lists.isEmpty(materials)}" class="empty-state">
            <div class="empty-state-icon">
                <svg class="w-8 h-8 text-text-secondary" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg>
            </div>
            <h3 class="empty-state-title">No materials found</h3>
            <p class="empty-state-text">Try adjusting your filters or add a new material to get started.</p>
            <a href="/materials/new" class="btn-primary">Add your first material</a>
        </div>

        <div th:if="${!#lists.isEmpty(materials)}" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
            <a th:each="m : ${materials}" th:href="@{/materials/{id}(id=${m.id})}"
               class="card-interactive group p-0 overflow-hidden">
                <!-- Video Thumbnail Area -->
                <div class="h-32 bg-surface-warm flex items-center justify-center relative">
                    <th:block th:if="${m.driveFileId != null}">
                        <svg class="w-10 h-10 text-primary/40 group-hover:text-primary transition-colors" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                    </th:block>
                    <th:block th:if="${m.driveFileId == null}">
                        <svg class="w-8 h-8 text-text-secondary/30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg>
                    </th:block>
                </div>
                <!-- Card Body -->
                <div class="p-4">
                    <h3 class="font-heading font-semibold text-text-primary mb-2 truncate group-hover:text-primary transition-colors" th:text="${m.name}">Material</h3>
                    <div class="flex flex-wrap items-center gap-2 mb-3">
                        <span th:if="${m.danceType != null}" class="badge-primary" th:text="${m.danceType.name}">Type</span>
                        <span th:if="${m.danceCategory != null}" class="badge-secondary" th:text="${m.danceCategory.name}">Category</span>
                    </div>
                    <!-- Rating Stars -->
                    <div class="flex items-center gap-0.5" th:if="${m.rating != null && m.rating > 0}">
                        <th:block th:each="i : ${#numbers.sequence(1,5)}">
                            <svg th:classappend="${i <= m.rating ? 'star-filled' : 'star'}" viewBox="0 0 24 24" fill="currentColor"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
                        </th:block>
                    </div>
                </div>
            </a>
        </div>
    </div>

</section>
</html>
