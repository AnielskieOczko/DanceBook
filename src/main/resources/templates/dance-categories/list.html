<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: html(content=~{::section})}">

<section th:with="activeNav='dance-categories'">

    <!-- Page Header -->
    <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 mb-6">
        <div class="page-header mb-0">
            <h1 class="page-title">Categories</h1>
            <p class="page-subtitle" th:text="${#lists.size(danceCategories)} + ' categories'">0 categories</p>
        </div>
        <a href="/dance-categories/new" class="btn-primary">
            <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Add Category
        </a>
    </div>

    <div th:if="${#lists.isEmpty(danceCategories)}" class="empty-state">
        <div class="empty-state-icon">
            <svg class="w-8 h-8 text-text-secondary" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>
        </div>
        <h3 class="empty-state-title">No categories</h3>
        <p class="empty-state-text">Add categories to organize materials by level, routine type, etc.</p>
        <a href="/dance-categories/new" class="btn-primary">Add Category</a>
    </div>

    <div th:if="${!#lists.isEmpty(danceCategories)}" class="card divide-y divide-border">
        <div th:each="dc : ${danceCategories}" class="flex items-center justify-between p-4 hover:bg-surface-warm/50 transition-colors">
            <div class="flex items-center gap-3">
                <div class="w-9 h-9 rounded-button bg-emerald-100 flex items-center justify-center flex-shrink-0">
                    <svg class="w-4 h-4 text-secondary" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>
                </div>
                <span class="font-medium text-text-primary" th:text="${dc.name}">Name</span>
            </div>
            <div class="flex items-center gap-2">
                <a th:href="@{/dance-categories/{id}/edit(id=${dc.id})}" class="btn-icon p-1.5" title="Edit">
                    <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                </a>
                <form th:action="@{/dance-categories/{id}/delete(id=${dc.id})}" method="post"
                      onsubmit="return confirm('Delete this category?')">
                    <button type="submit" class="btn-icon p-1.5 hover:text-danger" title="Delete">
                        <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
                    </button>
                </form>
            </div>
        </div>
    </div>

</section>
</html>
