<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: html(content=~{::section})}">

<section th:with="activeNav='profile'">

    <div class="page-header">
        <h1 class="page-title">Profile</h1>
        <p class="page-subtitle">Your account settings</p>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">

        <!-- Profile Card -->
        <div class="lg:col-span-1">
            <div class="card p-6 text-center">
                <div class="avatar avatar-lg mx-auto mb-4" th:text="${appUser.displayName != null ? appUser.displayName.substring(0,1) : '?'}">R</div>
                <h2 class="font-heading font-bold text-lg text-text-primary" th:text="${appUser.displayName}">Name</h2>
                <p class="text-sm text-text-secondary" th:text="${appUser.email}">email@example.com</p>
                <div class="mt-3">
                    <span class="badge-primary" th:text="${appUser.role}">USER</span>
                </div>
                <div class="divider"></div>
                <div class="text-xs text-text-secondary space-y-1">
                    <p>Username: <span class="font-medium text-text-primary" th:text="${appUser.username}">username</span></p>
                </div>
            </div>
        </div>

        <!-- Password Change -->
        <div class="lg:col-span-2">
            <div th:fragment="passwordSection" id="password-section" class="card p-6">
                <h2 class="font-heading font-semibold text-lg text-text-primary mb-4 flex items-center gap-2">
                    <svg class="w-5 h-5 text-primary" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                    Change Password
                </h2>

                <!-- Success/Error messages -->
                <div th:if="${passwordSuccessMsg}" class="mb-4 p-3 rounded-button bg-success-soft text-success text-sm font-medium flex items-center gap-2">
                    <svg class="w-4 h-4 flex-shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
                    <span th:text="${passwordSuccessMsg}">Success</span>
                </div>
                <div th:if="${passwordErrorMsg}" class="mb-4 p-3 rounded-button bg-danger-soft text-danger text-sm font-medium flex items-center gap-2">
                    <svg class="w-4 h-4 flex-shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
                    <span th:text="${passwordErrorMsg}">Error</span>
                </div>

                <form th:hx-post="@{/profile/password}" hx-target="#password-section" hx-swap="outerHTML" class="space-y-4">
                    <div>
                        <label for="currentPassword" class="form-label">Current Password</label>
                        <input id="currentPassword" type="password" name="currentPassword" required class="form-input">
                    </div>
                    <div>
                        <label for="newPassword" class="form-label">New Password</label>
                        <input id="newPassword" type="password" name="newPassword" required class="form-input"
                               minlength="8" placeholder="Min 8 characters">
                    </div>
                    <div>
                        <label for="confirmPassword" class="form-label">Confirm New Password</label>
                        <input id="confirmPassword" type="password" name="confirmPassword" required class="form-input">
                    </div>
                    <button type="submit" class="btn-primary">
                        <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                        Update Password
                    </button>
                </form>
            </div>
        </div>
    </div>

</section>
</html>
