<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: html(content=~{::main})}">

<main class="max-w-2xl mx-auto bg-white p-8 rounded-lg shadow-md border border-gray-200 mt-8">
  <div class="mb-6 border-b border-gray-200 pb-4">
    <h1 class="text-3xl font-bold text-indigo-600" th:text="${materialId == null ? 'New Material' : 'Edit Material'}">Form Title</h1>
  </div>

  <form th:action="${materialId == null ? '/materials' : '/materials/' + materialId}" 
        th:object="${material}" method="post" class="space-y-6">
    
    <!-- Hidden version field for optimistic locking -->
    <input type="hidden" th:field="*{version}"/>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Name *</label>
      <input type="text" th:field="*{name}" 
             class="w-full px-4 py-2 border rounded-md focus:ring-indigo-500 focus:border-indigo-500 shadow-sm"
             th:classappend="${#fields.hasErrors('name')} ? 'border-red-500' : 'border-gray-300'"/>
      <p th:if="${#fields.hasErrors('name')}" th:errors="*{name}" class="mt-1 text-sm text-red-600"></p>
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Description</label>
      <textarea th:field="*{description}" rows="3"
             class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-indigo-500 focus:border-indigo-500 shadow-sm"></textarea>
    </div>

    <div class="grid grid-cols-2 gap-6">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Dance Type</label>
        <select th:field="*{danceTypeId}" class="w-full px-4 py-2 border border-gray-300 rounded-md bg-white shadow-sm focus:ring-indigo-500 focus:border-indigo-500">
          <option value="">-- Select Type --</option>
          <option th:each="type : ${danceTypes}" th:value="${type.id}" th:text="${type.name}"></option>
        </select>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Category</label>
        <select th:field="*{danceCategoryId}" class="w-full px-4 py-2 border border-gray-300 rounded-md bg-white shadow-sm focus:ring-indigo-500 focus:border-indigo-500">
          <option value="">-- Select Category --</option>
          <option th:each="cat : ${danceCategories}" th:value="${cat.id}" th:text="${cat.name}"></option>
        </select>
      </div>
    </div>

    <div class="grid grid-cols-2 gap-6">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Rating (1-5)</label>
        <input type="number" th:field="*{rating}" min="1" max="5"
               class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-indigo-500 focus:border-indigo-500 shadow-sm"/>
        <p th:if="${#fields.hasErrors('rating')}" th:errors="*{rating}" class="mt-1 text-sm text-red-600"></p>
      </div>
    </div>

    <div class="space-y-4 pt-2">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Video Link (e.g. YouTube, Google Drive)</label>
        <input type="url" th:field="*{videoLink}" 
               class="w-full px-4 py-2 border rounded-md focus:ring-indigo-500 focus:border-indigo-500 shadow-sm"
               th:classappend="${#fields.hasErrors('videoLink')} ? 'border-red-500' : 'border-gray-300'"/>
        <p th:if="${#fields.hasErrors('videoLink')}" th:errors="*{videoLink}" class="mt-1 text-sm text-red-600"></p>
      </div>
      
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Source Link (e.g. Facebook post)</label>
        <input type="url" th:field="*{sourceLink}" 
               class="w-full px-4 py-2 border rounded-md focus:ring-indigo-500 focus:border-indigo-500 shadow-sm"
               th:classappend="${#fields.hasErrors('sourceLink')} ? 'border-red-500' : 'border-gray-300'"/>
        <p th:if="${#fields.hasErrors('sourceLink')}" th:errors="*{sourceLink}" class="mt-1 text-sm text-red-600"></p>
      </div>
    </div>

    <div class="flex justify-end space-x-3 pt-6 border-t border-gray-200">
      <a href="/materials" class="px-4 py-2 border border-gray-300 rounded-md text-gray-700 hover:bg-gray-50 font-medium transition">
        Cancel
      </a>
      <button type="submit" class="px-4 py-2 bg-indigo-600 text-white rounded-md hover:bg-indigo-700 font-medium transition shadow-sm">
        Save Material
      </button>
    </div>
  </form>
</main>
</html>
