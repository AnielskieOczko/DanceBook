<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: html(content=~{::section})}">

<section th:with="activeNav='lists'">

    <!-- Breadcrumb -->
    <nav class="flex items-center gap-2 text-sm text-text-secondary mb-6">
        <a href="/lists" class="hover:text-primary transition-colors">Lists</a>
        <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
        <span class="text-text-primary font-medium truncate" th:text="${customList.name}">List Name</span>
    </nav>

    <!-- Header -->
    <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 mb-6">
        <div>
            <h1 class="page-title" th:text="${customList.name}">List Name</h1>
            <div class="flex flex-wrap gap-2 mt-2">
                <span th:each="t : ${customList.danceTypes}" class="badge-primary" th:text="${t.name}">Type</span>
                <span th:each="c : ${customList.danceCategories}" class="badge-secondary" th:text="${c.name}">Cat</span>
                <span th:if="${customList.minRating != null}" class="badge-accent" th:text="${customList.minRating} + '+ stars'">Rating</span>
                <span th:if="${customList.nameFilter != null}" class="badge-neutral" th:text="'Search: ' + ${customList.nameFilter}">Filter</span>
                <span th:if="${customList.isPublic}" class="badge-secondary">Public</span>
                <span th:if="${!customList.isPublic}" class="badge-neutral">Private</span>
            </div>
        </div>
        <div class="flex gap-2">
            <a th:href="@{/lists/{id}/edit(id=${customList.id})}" class="btn-outline btn-sm">
                <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                Edit
            </a>
            <form th:action="@{/lists/{id}/delete(id=${customList.id})}" method="post"
                  onsubmit="return confirm('Delete this list?')">
                <button type="submit" class="btn-danger btn-sm">
                    <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
                    Delete
                </button>
            </form>
        </div>
    </div>

    <!-- Materials in this list -->
    <div th:if="${#lists.isEmpty(materials)}" class="empty-state">
        <div class="empty-state-icon">
            <svg class="w-8 h-8 text-text-secondary" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg>
        </div>
        <h3 class="empty-state-title">No matching materials</h3>
        <p class="empty-state-text">This list's filters don't match any materials yet. Try adding materials or adjusting the filters.</p>
    </div>

    <div th:if="${!#lists.isEmpty(materials)}" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
        <a th:each="m : ${materials}" th:href="@{/materials/{id}(id=${m.id})}"
           class="card-interactive group p-0 overflow-hidden">
            <div class="h-28 bg-surface-warm flex items-center justify-center">
                <th:block th:if="${m.driveFileId != null}">
                    <svg class="w-10 h-10 text-primary/40 group-hover:text-primary transition-colors" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                </th:block>
                <th:block th:if="${m.driveFileId == null}">
                    <svg class="w-8 h-8 text-text-secondary/30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg>
                </th:block>
            </div>
            <div class="p-4">
                <h3 class="font-heading font-semibold text-text-primary group-hover:text-primary transition-colors truncate" th:text="${m.name}">Material</h3>
                <div class="flex flex-wrap items-center gap-1.5 mt-2">
                    <span th:if="${m.danceType != null}" class="badge-primary text-[10px]" th:text="${m.danceType.name}">Type</span>
                    <span th:if="${m.danceCategory != null}" class="badge-secondary text-[10px]" th:text="${m.danceCategory.name}">Cat</span>
                </div>
            </div>
        </a>
    </div>

</section>
</html>
