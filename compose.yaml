services:
  postgres:
    image: postgres:16-alpine
    container_name: dancebook-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: dancebook
      POSTGRES_USER: dancebook
      POSTGRES_PASSWORD: dancebook
    volumes:
      - dancebook-data:/var/lib/postgresql/data
volumes:
  dancebook-data: