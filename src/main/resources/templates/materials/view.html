<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{layout :: html(content=~{::section})}">

<section th:with="activeNav='materials'" class="space-y-lg -mt-4 md:-mt-8">

    <!-- Contextual Sub-Header -->
    <header class="flex items-center justify-between py-4 border-b border-surface-variant mb-6">
        <a href="/materials" class="flex items-center gap-2 text-on-surface-variant hover:text-on-surface transition-colors group">
            <span class="material-symbols-outlined group-hover:-translate-x-1 transition-transform">arrow_back</span>
            <span class="font-label-sm text-label-sm uppercase tracking-wider">Library</span>
        </a>
        <div class="flex items-center gap-4">
            <a th:href="@{/materials/{id}/edit(id=${material.id})}" class="px-6 py-sm rounded-full bg-primary-fixed text-on-primary-fixed font-label-sm text-label-sm uppercase tracking-wider flex items-center gap-2 hover:opacity-90 transition-opacity">
                <span class="material-symbols-outlined text-[18px]">edit</span>
                Edit Notes
            </a>
        </div>
    </header>

    <!-- Cinematic Video Player -->
    <section class="w-full aspect-video bg-black rounded-xl overflow-hidden shadow-ambient relative group">
        <th:block th:if="${material.driveFileId != null}">
            <iframe th:src="'https://drive.google.com/file/d/' + ${material.driveFileId} + '/preview'"
                    class="w-full h-full border-0" allowfullscreen allow="autoplay"></iframe>
        </th:block>
        <th:block th:if="${material.driveFileId == null && material.videoLink != null}">
            <div class="w-full h-full flex flex-col items-center justify-center bg-surface-container-highest">
                <a th:href="${material.videoLink}" target="_blank" rel="noopener" class="flex flex-col items-center gap-4 text-primary hover:text-primary-hover transition-colors">
                    <span class="material-symbols-outlined text-6xl">play_circle</span>
                    <span class="text-body-lg font-medium">Watch External Video</span>
                </a>
            </div>
        </th:block>
    </section>

    <!-- Two Column Layout -->
    <div class="grid grid-cols-1 lg:grid-cols-12 gap-gutter mt-lg">
        <!-- Left Column: Details & Figures -->
        <div class="lg:col-span-8 space-y-lg">
            <!-- Title & Meta -->
            <div class="space-y-4">
                <div class="flex flex-wrap gap-2">
                    <span th:if="${material.danceType != null}" class="px-3 py-1 bg-surface-container rounded font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider" th:text="${material.danceType.name}">Style</span>
                    <span th:if="${material.danceType != null && material.danceType.category != null}" class="px-3 py-1 bg-surface-container rounded font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider" th:text="${material.danceType.category.name}">Category</span>
                </div>
                <h1 class="font-headline-lg text-headline-lg text-on-surface" th:text="${material.name}">Material Name</h1>
                <p class="font-body-md text-on-surface leading-relaxed max-w-3xl" th:text="${material.description}">Description</p>
            </div>

            <!-- Figures List (Bento Grid Style) -->
            <div class="space-y-6">
                <h2 class="font-headline-md text-headline-md text-on-surface flex items-center gap-3">
                    <span class="material-symbols-outlined text-primary">format_list_bulleted</span>
                    Key Figures & Movements
                </h2>
                
                <div th:if="${#lists.isEmpty(figures)}" class="p-8 border border-dashed border-outline-variant rounded-xl text-center text-outline">
                    No figures tracked for this sequence yet.
                </div>

                <div th:if="${!#lists.isEmpty(figures)}" class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div th:each="f : ${figures}" class="p-4 border border-surface-variant rounded-lg bg-surface flex gap-4 items-center hover:shadow-ambient hover:-translate-y-[2px] transition-all cursor-pointer group">
                        <div class="w-16 h-16 rounded bg-surface-container overflow-hidden shrink-0 relative flex items-center justify-center">
                            <span class="material-symbols-outlined text-outline/30 group-hover:text-primary/50 transition-colors">accessibility_new</span>
                            <div class="absolute inset-0 bg-black/5 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
                                <span class="material-symbols-outlined text-white text-sm">play_arrow</span>
                            </div>
                        </div>
                        <div class="flex-1 min-w-0">
                            <span class="font-label-sm text-label-sm text-primary uppercase tracking-wider block mb-1" th:text="${f.startTime + ' – ' + f.endTime}">0:00</span>
                            <h3 class="font-body-md text-on-surface font-medium truncate" th:text="${f.name}">Figure Name</h3>
                        </div>
                        <form th:action="@{/materials/{mId}/figures/{fId}/delete(mId=${material.id}, fId=${f.id})}"
                              method="post" class="opacity-0 group-hover:opacity-100 transition-opacity">
                            <button type="submit" class="text-outline-variant hover:text-error transition-colors"
                                    onclick="return confirm('Delete this figure?')">
                                <span class="material-symbols-outlined text-[20px]">close</span>
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>

        <!-- Right Column: Director's Notes -->
        <div class="lg:col-span-4 pl-0 lg:pl-6 lg:border-l border-surface-variant">
            <div class="sticky top-28 space-y-8">
                <div th:replace="~{materials/fragments/comments :: comment-list}"></div>
            </div>
        </div>
    </div>

</section>
</html>
