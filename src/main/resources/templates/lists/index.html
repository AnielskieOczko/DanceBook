<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: html(content=~{::section})}">

<section th:with="activeNav='lists'">

    <!-- Page Header -->
    <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 mb-6">
        <div class="page-header mb-0">
            <h1 class="page-title">My Lists</h1>
            <p class="page-subtitle">Curated collections of your dance materials</p>
        </div>
        <a href="/lists/new" class="btn-primary">
            <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            New List
        </a>
    </div>

    <!-- Lists Grid -->
    <div th:if="${#lists.isEmpty(lists)}" class="empty-state">
        <div class="empty-state-icon">
            <svg class="w-8 h-8 text-text-secondary" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
        </div>
        <h3 class="empty-state-title">No lists yet</h3>
        <p class="empty-state-text">Create a list to group and filter materials by dance style, category, or any combination.</p>
        <a href="/lists/new" class="btn-primary">Create your first list</a>
    </div>

    <div th:if="${!#lists.isEmpty(lists)}" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
        <a th:each="list : ${lists}" th:href="@{/lists/{id}(id=${list.id})}"
           class="card-interactive p-5 group">
            <div class="flex items-start justify-between mb-3">
                <div class="w-10 h-10 rounded-button bg-primary-soft flex items-center justify-center flex-shrink-0">
                    <svg class="w-5 h-5 text-primary" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
                </div>
                <span th:if="${list.isPublic}" class="badge-secondary text-[10px]">
                    <svg class="w-3 h-3" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/></svg>
                    Public
                </span>
                <span th:if="${!list.isPublic}" class="badge-neutral text-[10px]">
                    <svg class="w-3 h-3" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                    Private
                </span>
            </div>
            <h3 class="font-heading font-semibold text-text-primary group-hover:text-primary transition-colors mb-2" th:text="${list.name}">List Name</h3>
            <div class="flex flex-wrap gap-1.5">
                <span th:each="t : ${list.danceTypes}" class="badge-primary text-[10px]" th:text="${t.name}">Type</span>
                <span th:each="c : ${list.danceCategories}" class="badge-secondary text-[10px]" th:text="${c.name}">Cat</span>
                <span th:if="${list.minRating != null}" class="badge-accent text-[10px]" th:text="${list.minRating} + '+ stars'">3+ stars</span>
            </div>
        </a>
    </div>

</section>
</html>
