<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: html(content=~{::section})}">

<section th:with="activeNav='lists'">

    <!-- Breadcrumb -->
    <nav class="flex items-center gap-2 text-sm text-text-secondary mb-6">
        <a href="/lists" class="hover:text-primary transition-colors">Lists</a>
        <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
        <span class="text-text-primary font-medium truncate" th:text="${customList.name}">List Name</span>
    </nav>

    <!-- Header -->
    <div class="mb-6 relative rounded-xl overflow-hidden border border-border bg-surface-warm">
        <!-- Cover Image Background -->
        <div class="absolute inset-0 z-0">
            <img th:if="${customList.imageFilename != null}" th:src="@{/uploads/lists/{filename}(filename=${customList.imageFilename})}" alt="Cover" class="w-full h-full object-cover opacity-20">
            <img th:unless="${customList.imageFilename != null}" th:src="@{/uploads/defaults/list-placeholder.png}" onerror="this.src='/images/categories/placeholder.png'" alt="Default Cover" class="w-full h-full object-cover opacity-10 mix-blend-multiply">
            <div class="absolute inset-0 bg-gradient-to-t from-surface-warm via-surface-warm/80 to-transparent"></div>
        </div>
        
        <div class="relative z-10 p-8 flex flex-col sm:flex-row sm:items-start sm:justify-between gap-4">
            <div>
                <h1 class="page-title mb-2 text-4xl" th:text="${customList.name}">List Name</h1>
                <div class="flex flex-wrap gap-2 mt-2">
                    <span th:each="t : ${customList.danceTypes}" class="badge-primary" th:text="${t.name}">Type</span>
                    <span th:each="c : ${customList.danceCategories}" class="badge-secondary" th:text="${c.name}">Cat</span>
                    <span th:if="${customList.minRating != null}" class="badge-accent" th:text="${customList.minRating} + '+ stars'">Rating</span>
                    <span th:if="${customList.nameFilter != null}" class="badge-neutral" th:text="'Search: ' + ${customList.nameFilter}">Filter</span>
                    <span th:if="${customList.isPublic}" class="badge-secondary">Public</span>
                    <span th:if="${!customList.isPublic}" class="badge-neutral">Private</span>
                </div>
            </div>
            
            <!-- Right Column: View Toggle & Actions -->
            <div class="flex flex-col items-end gap-3 shrink-0 mt-2 sm:mt-0 w-full sm:w-auto">
                <!-- View Toggle -->
                <div class="flex bg-white/60 backdrop-blur-md p-1 rounded-lg border border-outline-variant/30 h-[42px] items-center">
                    <label class="cursor-pointer">
                        <input type="radio" name="view" value="grid" class="hidden peer"
                               th:checked="${currentView == 'grid'}"
                               th:hx-get="@{/lists/{id}(id=${customList.id})}" hx-target="#materials-grid" hx-swap="outerHTML">
                        <div class="px-2.5 py-1 rounded-md flex items-center gap-1.5 text-label-sm font-label-sm transition-all peer-checked:bg-white peer-checked:text-primary peer-checked:shadow-sm text-on-surface-variant hover:text-on-surface">
                            <span class="material-symbols-outlined text-[18px]">grid_view</span>
                        </div>
                    </label>
                    <label class="cursor-pointer">
                        <input type="radio" name="view" value="list" class="hidden peer"
                               th:checked="${currentView == 'list'}"
                               th:hx-get="@{/lists/{id}(id=${customList.id})}" hx-target="#materials-grid" hx-swap="outerHTML">
                        <div class="px-2.5 py-1 rounded-md flex items-center gap-1.5 text-label-sm font-label-sm transition-all peer-checked:bg-white peer-checked:text-primary peer-checked:shadow-sm text-on-surface-variant hover:text-on-surface">
                            <span class="material-symbols-outlined text-[18px]">view_list</span>
                        </div>
                    </label>
                </div>
                
                <!-- Action Buttons -->
                <div class="flex items-center gap-2">
                    <a th:href="@{/lists/{id}/edit(id=${customList.id})}" 
                       class="flex items-center justify-center w-10 h-10 rounded-full bg-white/60 backdrop-blur-md border border-outline-variant/30 text-on-surface-variant hover:text-primary hover:bg-white transition-colors" title="Edit Collection">
                        <span class="material-symbols-outlined text-[20px]">edit</span>
                    </a>
                    <button type="button" class="js-open-delete-modal flex items-center justify-center w-10 h-10 rounded-full bg-white/60 backdrop-blur-md border border-outline-variant/30 text-on-surface-variant hover:text-danger hover:bg-danger-soft hover:border-danger/30 transition-colors" title="Delete Collection">
                        <span class="material-symbols-outlined text-[20px]">delete</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Delete Confirmation Modal -->
    <div id="deleteConfirmModal" style="display: none;" class="fixed inset-0 z-[100] items-center justify-center bg-black/40 backdrop-blur-sm transition-opacity">
        <div class="bg-white rounded-xl shadow-ambient border border-outline-variant max-w-md w-full mx-4 p-6 relative">
            <div class="flex items-center gap-4 mb-4 text-danger">
                <div class="w-10 h-10 rounded-full bg-danger-soft flex items-center justify-center shrink-0">
                    <span class="material-symbols-outlined">warning</span>
                </div>
                <h3 class="font-headline-md text-on-surface text-xl">Delete Collection?</h3>
            </div>
            <p class="text-on-surface-variant font-body-md mb-6">
                Are you sure you want to delete "<span class="font-semibold text-on-surface" th:text="${customList.name}"></span>"? This action cannot be undone, but the materials inside will not be deleted.
            </p>
            <div class="flex justify-end gap-3">
                <button type="button" class="js-close-delete-modal btn-outline">Cancel</button>
                <form th:action="@{/lists/{id}/delete(id=${customList.id})}" method="post" class="contents">
                    <button type="submit" class="btn-danger">Delete Collection</button>
                </form>
            </div>
        </div>
    </div>

    <!-- Materials in this list -->
    <div th:replace="~{materials/list :: materialsTable}"></div>

</section>
</html>
