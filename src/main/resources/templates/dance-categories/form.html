<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: html(content=~{::section})}">

<section th:with="activeNav='dance-categories'" class="max-w-2xl mx-auto py-12">

    <div class="mb-8 pb-6 border-b border-neutral-100">
        <h1 class="text-3xl font-headline-lg text-on-surface mb-2" th:text="${danceCategoryId == null ? 'New Category' : 'Edit Category'}">Form Title</h1>
        <p class="text-on-surface-variant font-body-md">Define a new high-level grouping for your dance styles.</p>
    </div>

    <form th:action="@{${danceCategoryId == null ? '/dance-categories' : '/dance-categories/' + danceCategoryId}(_csrf=${_csrf.token})}"
          th:object="${danceCategory}" method="post" enctype="multipart/form-data" class="card p-8 shadow-ambient">

        <div class="space-y-6">
            <div>
                <label for="catName" class="form-label">Category Name *</label>
                <input id="catName" type="text" th:field="*{name}" required 
                       class="form-input"
                       th:classappend="${#fields.hasErrors('name')} ? 'border-danger ring-1 ring-danger' : ''"
                       placeholder="e.g. Ballet, Contemporary, Jazz...">
                <p th:if="${#fields.hasErrors('name')}" th:errors="*{name}" class="form-error"></p>
            </div>
            
            <!-- Image Upload Section -->
            <div>
                <label class="form-label">Category Image</label>
                
                <!-- Current Image Preview -->
                <div th:if="${currentImage != null}" class="mb-4">
                    <p class="text-xs text-on-surface-variant mb-2">Current Image:</p>
                    <div class="relative w-48 h-32 rounded-lg overflow-hidden border border-outline-variant">
                        <img th:src="@{/uploads/categories/{filename}(filename=${currentImage})}" alt="Current Category Image" class="w-full h-full object-cover">
                    </div>
                </div>

                <!-- File Input -->
                <label id="uploadBox" for="imageUpload" class="mt-1 flex flex-col items-center justify-center px-6 pt-5 pb-6 border-2 border-outline-variant border-dashed rounded-lg hover:border-primary transition-all bg-surface-container-low cursor-pointer relative overflow-hidden h-40">
                    <div id="uploadContent" class="space-y-1 text-center">
                        <span class="material-symbols-outlined text-4xl text-on-surface-variant mx-auto block">image</span>
                        <div class="text-sm text-on-surface-variant justify-center mt-2">
                            <span class="font-medium text-primary hover:text-primary-hover">Upload a file</span>
                            <span>or click here to select</span>
                            <input id="imageUpload" name="image" type="file" accept="image/*" class="sr-only">
                        </div>
                        <p class="text-xs text-outline mt-1">PNG, JPG, GIF up to 10MB</p>
                    </div>

                    <!-- Local Preview Container (Hidden by default) -->
                    <div id="previewContainer" class="hidden absolute inset-0 w-full h-full bg-surface-container-low z-10">
                        <img id="imagePreview" class="w-full h-full object-contain" src="#" alt="Image preview">
                        <div class="absolute inset-0 bg-black/40 flex flex-col items-center justify-center opacity-0 hover:opacity-100 transition-opacity">
                            <span class="material-symbols-outlined text-white text-3xl mb-1">edit</span>
                            <span id="previewFilename" class="text-white text-sm font-medium px-4 text-center truncate w-full">Change image</span>
                        </div>
                    </div>
                </label>
            </div>
        </div>

        <div class="flex justify-end gap-4 mt-10 pt-6 border-t border-border">
            <a href="/dance-categories" class="btn-outline">Cancel</a>
            <button type="submit" class="btn-primary">Save Category</button>
        </div>
    </form>

    <script th:src="@{/js/image-upload-preview.js}"></script>
</section>
</html>
