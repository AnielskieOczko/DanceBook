<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: html(content=~{::section})}">

<section th:with="activeNav='dance-categories'">

    <div class="page-header">
        <h1 class="page-title" th:text="${danceCategoryId == null ? 'New Category' : 'Edit Category'}">Form Title</h1>
    </div>

    <form th:action="${danceCategoryId == null ? '/dance-categories' : '/dance-categories/' + danceCategoryId}"
          th:object="${danceCategory}" method="post" class="card p-6 md:p-8 space-y-6 max-w-lg">

        <div>
            <label for="catName" class="form-label">Name *</label>
            <input id="catName" type="text" th:field="*{name}" required class="form-input"
                   th:classappend="${#fields.hasErrors('name')} ? 'border-danger ring-1 ring-danger' : ''"
                   placeholder="e.g. Bronze, Silver, Gold, Competition...">
            <p th:if="${#fields.hasErrors('name')}" th:errors="*{name}" class="form-error"></p>
        </div>

        <div class="flex justify-end gap-3 pt-4 border-t border-border">
            <a href="/dance-categories" class="btn-outline">Cancel</a>
            <button type="submit" class="btn-primary">Save Category</button>
        </div>
    </form>

</section>
</html>
