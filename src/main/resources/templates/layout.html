<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    <title>DanceBook</title>

    <!-- Tailwind CSS (compiled by our Gradle task) -->
    <link th:href="@{/css/output.css}" rel="stylesheet">

    <!-- HTMX (loaded via CDN) -->
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script>
      // Tell HTMX to include the CSRF token on every request
      document.addEventListener('htmx:configRequest', function(event) {
        var token = document.querySelector('meta[name="_csrf"]').content;
        var header = document.querySelector('meta[name="_csrf_header"]').content;
        event.detail.headers[header] = token;
      });
    </script>
</head>
<body class="bg-gray-50 text-gray-900 font-sans">

<nav class="bg-indigo-600 border-b border-indigo-700 shadow-sm relative z-50">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex justify-between h-16">
      <div class="flex">
        <div class="flex-shrink-0 flex items-center">
          <a href="/" class="text-white font-extrabold text-xl tracking-wide hover:text-indigo-100 transition">DanceBook 💃</a>
        </div>
        <div class="hidden sm:ml-8 sm:flex sm:space-x-6 sm:items-center">
          <a href="/materials" class="border-transparent text-indigo-100 hover:border-indigo-200 hover:text-white inline-flex items-center px-1 pt-1 border-b-2 text-sm font-medium transition">Materials</a>
          <a href="/dance-types" class="border-transparent text-indigo-100 hover:border-indigo-200 hover:text-white inline-flex items-center px-1 pt-1 border-b-2 text-sm font-medium transition">Styles</a>
          <a href="/dance-categories" class="border-transparent text-indigo-100 hover:border-indigo-200 hover:text-white inline-flex items-center px-1 pt-1 border-b-2 text-sm font-medium transition">Categories</a>

          <!-- Lists Dropdown -->
          <div class="relative group">
            <button type="button" class="text-indigo-100 hover:text-white inline-flex items-center gap-1 px-1 pt-1 border-b-2 border-transparent text-sm font-medium transition">
              📋 Lists
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
            </button>
            <div class="absolute left-0 mt-1 w-52 bg-white rounded-lg shadow-lg border border-gray-200 opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-150 z-50">
              <div class="py-1">
                <th:block th:each="list : ${navLists}">
                  <a th:href="@{/lists/{id}(id=${list.id})}" 
                     class="block px-4 py-2 text-sm text-gray-700 hover:bg-indigo-50 hover:text-indigo-700 transition">
                    <span th:if="${list.isPublic}" class="mr-1">🌍</span>
                    <span th:unless="${list.isPublic}" class="mr-1">🔒</span>
                    <span th:text="${list.name}">List Name</span>
                  </a>
                </th:block>
                <div th:if="${#lists.isEmpty(navLists)}" class="px-4 py-2 text-xs text-gray-400 italic">No lists yet</div>
                <div class="border-t border-gray-100 mt-1 pt-1">
                  <a href="/lists/new" class="block px-4 py-2 text-sm text-indigo-600 hover:bg-indigo-50 font-medium transition">
                    + New List
                  </a>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Current user display / Auth -->
      <div class="hidden sm:flex sm:items-center ml-4">
        
        <!-- Logged In View -->
        <div sec:authorize="isAuthenticated()" class="relative group">
          <button type="button" class="text-indigo-200 hover:text-white inline-flex items-center gap-1 text-sm transition focus:outline-none py-2">
            👤 <span sec:authentication="name" class="font-medium text-white">User</span>
            <svg class="w-4 h-4 ml-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
          </button>
          
          <div class="absolute right-0 mt-0 w-48 bg-white rounded-lg shadow-lg border border-gray-200 opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-150 z-50">
            <div class="py-1">
              <div class="px-4 py-2 text-xs font-semibold text-gray-500 uppercase tracking-wider bg-gray-50 border-b border-gray-100">Account</div>
              <a sec:authorize="hasRole('ADMIN')" href="/admin" class="block px-4 py-2 text-sm text-gray-700 hover:bg-indigo-50 hover:text-indigo-700 transition font-medium">
                ⚙️ Admin Panel
              </a>
              <form th:action="@{/logout}" method="post" class="m-0 mt-1">
                <button type="submit" class="w-full text-left px-4 py-2 text-sm text-red-600 hover:bg-red-50 transition flex items-center justify-between cursor-pointer font-medium">
                  Logout 🚪
                </button>
              </form>
            </div>
          </div>
        </div>

        <!-- Logged Out View -->
        <div sec:authorize="isAnonymous()">
          <a th:href="@{/login}" class="text-indigo-100 hover:text-white inline-flex items-center gap-1 px-3 py-2 text-sm font-medium transition bg-indigo-700 hover:bg-indigo-800 rounded-md shadow-sm border border-indigo-500">
            Sign In
          </a>
        </div>
        
      </div>
    </div>
  </div>
</nav>

<div class="p-8">
  <!-- This is where other templates will insert their content -->
  <div th:replace="${content}"></div>
</div>

</body>
</html>
