<div th:fragment="comment-list" id="comment-section" class="space-y-8">
    <h2 class="font-headline-md text-headline-md text-on-surface">Director's Notes</h2>

    <!-- Input Area -->
    <div class="mb-8">
        <form th:hx-post="@{/materials/{id}/comments(id=${material.id})}"
              hx-target="#comment-section"
              hx-swap="outerHTML"
              class="flex gap-4 items-start">
            <div class="w-10 h-10 rounded-full overflow-hidden bg-surface-container-highest flex-shrink-0 flex items-center justify-center text-on-surface font-bold">
                <span th:text="${currentUser != null && currentUser.displayName != null ? currentUser.displayName.substring(0,1) : 'U'}">U</span>
            </div>
            <div class="flex-1">
                <textarea name="content" required placeholder="Add a note or timestamp..."
                          class="w-full bg-transparent border-0 border-b border-surface-variant focus:border-primary focus:ring-0 px-0 pb-2 font-body-md text-on-surface placeholder:text-on-surface-variant/50 transition-colors resize-none"
                          rows="1"></textarea>
                <div class="flex justify-end mt-2">
                    <button type="submit" class="font-label-sm text-label-sm text-primary uppercase tracking-wider hover:opacity-70 transition-colors">Post Note</button>
                </div>
            </div>
        </form>
    </div>

    <!-- Comments List -->
    <div class="space-y-6">
        <th:block th:each="c : ${comments}">
            <div th:replace="~{materials/fragments/comments :: comment-item}"></div>
        </th:block>
        <div th:if="${#lists.isEmpty(comments)}" class="text-sm text-outline italic">
            No notes shared for this sequence yet.
        </div>
    </div>
</div>

<div th:fragment="comment-item" class="flex gap-4 group">
    <div class="w-10 h-10 rounded-full overflow-hidden bg-surface-container-highest flex-shrink-0 flex items-center justify-center text-on-surface font-bold">
        <span th:text="${c.author.displayName != null && c.author.displayName.length() > 0 ? c.author.displayName.substring(0,1) : '?'}">U</span>
    </div>
    <div class="flex-1 min-w-0">
        <div class="flex justify-between items-baseline mb-1">
            <div class="flex items-center gap-2">
                <span class="font-label-sm text-label-sm text-on-surface font-semibold" th:text="${c.author.displayName}">Marcus T.</span>
                <span th:if="${c.updatedAt != null}" class="text-[10px] text-outline uppercase">Edited</span>
            </div>
            <span class="font-label-sm text-label-sm text-on-surface-variant opacity-50"
                  th:text="${#temporals.format(c.updatedAt ?: c.createdAt, 'dd MMM')}">2 days ago</span>
        </div>
        <p class="font-body-md text-on-surface-variant leading-relaxed whitespace-pre-wrap" th:text="${c.content}">Note content</p>
        
        <!-- Actions -->
        <div class="flex gap-4 mt-2 opacity-0 group-hover:opacity-100 transition-opacity">
            <button th:if="${#authentication.name == c.author.username}"
                    th:hx-get="@{/materials/{mId}/comments/{cId}/edit(mId=${material.id}, cId=${c.id})}"
                    hx-target="closest .group"
                    hx-swap="outerHTML"
                    class="font-label-sm text-[10px] text-outline uppercase tracking-widest hover:text-primary transition-colors">Edit</button>
            <button th:if="${#authentication.name == c.author.username or #authorization.expression('hasRole(''ADMIN'')')}"
                    th:hx-delete="@{/materials/{mId}/comments/{cId}(mId=${material.id}, cId=${c.id})}"
                    hx-target="closest .group"
                    hx-swap="outerHTML"
                    hx-confirm="Remove this note?"
                    class="font-label-sm text-[10px] text-outline uppercase tracking-widest hover:text-error transition-colors">Delete</button>
        </div>
    </div>
</div>

<div th:fragment="comment-edit-form" class="group flex gap-4">
    <div class="w-10 h-10 rounded-full overflow-hidden bg-surface-container-highest flex-shrink-0 flex items-center justify-center text-on-surface font-bold">
        <span th:text="${c != null && c.author.displayName != null ? c.author.displayName.substring(0,1) : 'U'}">U</span>
    </div>
    <div class="flex-1">
        <form th:hx-put="@{/materials/{mId}/comments/{cId}(mId=${material.id}, cId=${comment.id})}"
              hx-target="closest .group"
              hx-swap="outerHTML">
            <textarea name="content" required class="w-full bg-transparent border-0 border-b border-primary focus:ring-0 px-0 pb-2 font-body-md text-on-surface"
                      rows="2" th:text="${comment.content}"></textarea>
            <div class="flex gap-4 mt-2 justify-end">
                <button type="button"
                        th:hx-get="@{/materials/{mId}/comments/{cId}(mId=${material.id}, cId=${comment.id})}"
                        hx-target="closest .group"
                        hx-swap="outerHTML"
                        class="font-label-sm text-[10px] text-outline uppercase tracking-widest">Cancel</button>
                <button type="submit" class="font-label-sm text-[10px] text-primary uppercase tracking-widest">Save</button>
            </div>
        </form>
    </div>
</div>
