<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: html(content=~{::main})}">

<main class="max-w-2xl mx-auto bg-white p-6 rounded-lg shadow-md border border-gray-200">

  <!-- Uses Tailwind classes we configured -->
  <h1 class="text-3xl font-bold text-indigo-600 mb-4">Welcome to DanceBook 💃🕺</h1>

  <!-- Uses the data we passed from HomeController -->
  <p class="text-lg mb-6">
    Database connection successful! Found
    <span class="font-bold text-green-600" th:text="${danceTypeCount}">0</span>
    dance types in the system.
  </p>

  <!-- Testing HTMX: clicking this button swaps its own text -->
  <button hx-get="/ping"
          hx-swap="outerHTML"
          class="bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2 px-4 rounded transition">
    Test HTMX /ping
  </button>

</main>
</html>
