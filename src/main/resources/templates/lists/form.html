<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: html(content=~{::section})}">

<section th:with="activeNav='lists'">

    <!-- Page Header -->
    <div class="page-header">
        <h1 class="page-title" th:text="${listId == null ? 'New List' : 'Edit List'}">Form Title</h1>
        <p class="page-subtitle">Create a filtered collection of your dance materials</p>
    </div>

    <form th:action="${listId == null ? '/lists' : '/lists/' + listId}"
          th:object="${listRequest}" method="post" class="card p-6 md:p-8 space-y-6">

        <!-- Name -->
        <div>
            <label for="listName" class="form-label">List Name *</label>
            <input id="listName" type="text" th:field="*{name}" required class="form-input"
                   placeholder="e.g. My Waltz Collection">
        </div>

        <!-- Name Filter -->
        <div>
            <label for="nameFilter" class="form-label">Name Filter</label>
            <input id="nameFilter" type="text" th:field="*{nameFilter}" class="form-input"
                   placeholder="Filter materials by name...">
            <p class="form-hint">Only materials matching this text will appear</p>
        </div>

        <!-- Dance Types (multi-select) -->
        <div>
            <label for="danceTypeIds" class="form-label">Dance Styles</label>
            <select id="danceTypeIds" th:field="*{danceTypeIds}" multiple class="form-select min-h-[80px]">
                <option th:each="type : ${danceTypes}" th:value="${type.id}" th:text="${type.name}"></option>
            </select>
            <p class="form-hint">Hold Ctrl/Cmd to select multiple</p>
        </div>

        <!-- Dance Categories (multi-select) -->
        <div>
            <label for="danceCategoryIds" class="form-label">Categories</label>
            <select id="danceCategoryIds" th:field="*{danceCategoryIds}" multiple class="form-select min-h-[80px]">
                <option th:each="cat : ${danceCategories}" th:value="${cat.id}" th:text="${cat.name}"></option>
            </select>
            <p class="form-hint">Hold Ctrl/Cmd to select multiple</p>
        </div>

        <!-- Min Rating -->
        <div class="max-w-[200px]">
            <label for="minRating" class="form-label">Minimum Rating</label>
            <input id="minRating" type="number" th:field="*{minRating}" min="1" max="5" class="form-input" placeholder="1-5">
        </div>

        <!-- Public Toggle -->
        <div class="flex items-center gap-3">
            <label class="relative inline-flex items-center cursor-pointer">
                <input type="checkbox" th:field="*{isPublic}" class="sr-only peer">
                <div class="w-11 h-6 bg-border rounded-pill peer-checked:bg-primary peer-focus:ring-2 peer-focus:ring-primary/30 transition-colors after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:after:translate-x-full"></div>
            </label>
            <div>
                <span class="text-sm font-medium text-text-primary">Public List</span>
                <p class="text-xs text-text-secondary">Visible to all users</p>
            </div>
        </div>

        <!-- Actions -->
        <div class="flex justify-end gap-3 pt-6 border-t border-border">
            <a href="/lists" class="btn-outline">Cancel</a>
            <button type="submit" class="btn-primary">
                <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
                Save List
            </button>
        </div>
    </form>

</section>
</html>
