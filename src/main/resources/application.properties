
spring.application.name=DanceBook



spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.url=${DATABASE_URL}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

spring.threads.virtual.enabled=true

# Google Drive - Server-side auth (no user popup needed)
google.drive.client-id=${GOOGLE_CLIENT_ID}
google.drive.client-secret=${GOOGLE_CLIENT_SECRET}
google.drive.refresh-token=${GOOGLE_REFRESH_TOKEN}
google.drive.folder-id=${GOOGLE_DRIVE_FOLDER_ID}

spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}

spring.security.oauth2.client.registration.google.scope=profile,email

# Security Configuration
dancebook.security.root-admin=rafal
dancebook.security.root-password=${ROOT_ADMIN_PASSWORD:change_me_immediately}

# Encoding
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.force=true
spring.thymeleaf.encoding=UTF-8
spring.jpa.properties.hibernate.connection.charSet=UTF-8
spring.jpa.properties.hibernate.connection.useUnicode=true
spring.datasource.hikari.connection-test-query=SELECT 1

