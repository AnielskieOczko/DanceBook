<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:fragment="html(content)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    <title th:text="${pageTitle != null ? pageTitle + ' · DanceBook' : 'DanceBook'}">DanceBook</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">

    <!-- Tailwind CSS -->
    <link th:href="@{/css/output.css}" rel="stylesheet">

    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script th:src="@{/js/main.js}"></script>
</head>
<body>

<!-- ═══════════════════════════════════════════════
     DESKTOP SIDEBAR (hidden on mobile)
     ═══════════════════════════════════════════════ -->
<aside class="sidebar hidden md:flex" sec:authorize="isAuthenticated()">
    <!-- Logo -->
    <div class="sidebar-logo">
        <a href="/" class="flex items-center gap-3 group">
            <div class="w-9 h-9 rounded-button bg-primary flex items-center justify-center flex-shrink-0">
                <svg class="w-5 h-5 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
                    <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
                </svg>
            </div>
            <span class="font-heading font-bold text-xl text-text-primary group-hover:text-primary transition-colors">DanceBook</span>
        </a>
    </div>

    <!-- Navigation -->
    <nav class="sidebar-nav">
        <p class="px-3 mb-2 text-[10px] font-semibold uppercase tracking-widest text-text-secondary">Menu</p>

        <a href="/" class="nav-item" th:classappend="${activeNav == 'home' ? 'nav-item-active' : ''}">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
            Dashboard
        </a>
        <a href="/materials" class="nav-item" th:classappend="${activeNav == 'materials' ? 'nav-item-active' : ''}">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg>
            Library
        </a>
        <a href="/lists" class="nav-item" th:classappend="${activeNav == 'lists' ? 'nav-item-active' : ''}">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
            My Lists
        </a>

        <div class="divider"></div>
        <p class="px-3 mb-2 text-[10px] font-semibold uppercase tracking-widest text-text-secondary">Manage</p>

        <a href="/dance-types" class="nav-item" th:classappend="${activeNav == 'dance-types' ? 'nav-item-active' : ''}">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>
            Styles
        </a>
        <a href="/dance-categories" class="nav-item" th:classappend="${activeNav == 'dance-categories' ? 'nav-item-active' : ''}">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>
            Categories
        </a>

        <!-- Admin Link -->
        <a sec:authorize="hasRole('ADMIN')" href="/admin" class="nav-item" th:classappend="${activeNav == 'admin' ? 'nav-item-active' : ''}">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
            Admin
        </a>

        <!-- Quick Lists -->
        <th:block th:if="${navLists != null && !navLists.isEmpty()}">
            <div class="divider"></div>
            <p class="px-3 mb-2 text-[10px] font-semibold uppercase tracking-widest text-text-secondary">Quick Lists</p>
            <a th:each="list : ${navLists}"
               th:href="@{/lists/{id}(id=${list.id})}"
               class="nav-item text-xs">
                <svg class="nav-icon w-4 h-4" th:if="${list.isPublic}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
                <svg class="nav-icon w-4 h-4" th:if="${!list.isPublic}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                <span th:text="${list.name}" class="truncate">List</span>
            </a>
        </th:block>
    </nav>

    <!-- Sidebar Footer — User -->
    <div class="sidebar-footer">
        <div class="flex items-center gap-3">
            <div class="avatar" th:if="${currentUser != null}">
                <span th:text="${currentUser.displayName != null ? currentUser.displayName.substring(0,1) : '?'}">U</span>
            </div>
            <div class="flex-1 min-w-0" th:if="${currentUser != null}">
                <p class="text-sm font-medium text-text-primary truncate" th:text="${currentUser.displayName}">User</p>
                <p class="text-xs text-text-secondary truncate" th:text="${currentUser.email}">email</p>
            </div>
        </div>
        <div class="flex gap-2 mt-3">
            <a href="/profile" class="btn btn-sm btn-ghost flex-1 text-xs">
                <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                Profile
            </a>
            <form th:action="@{/logout}" method="post" class="flex-1">
                <button type="submit" class="btn btn-sm btn-ghost w-full text-xs text-danger hover:bg-danger-soft">
                    <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                    Logout
                </button>
            </form>
        </div>
    </div>
</aside>

<!-- ═══════════════════════════════════════════════
     MOBILE TOP BAR (hidden on desktop)
     ═══════════════════════════════════════════════ -->
<header class="md:hidden fixed top-0 left-0 right-0 h-14 bg-surface border-b border-border z-40 flex items-center justify-between px-4" sec:authorize="isAuthenticated()">
    <div class="flex items-center gap-2">
        <div class="w-8 h-8 rounded-button bg-primary flex items-center justify-center">
            <svg class="w-4 h-4 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
                <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
            </svg>
        </div>
        <span class="font-heading font-bold text-lg text-text-primary" th:text="${pageTitle ?: 'DanceBook'}">DanceBook</span>
    </div>
    <a href="/profile" class="avatar avatar-sm" th:if="${currentUser != null}">
        <span th:text="${currentUser.displayName != null ? currentUser.displayName.substring(0,1) : '?'}">U</span>
    </a>
</header>

<!-- ═══════════════════════════════════════════════
     MAIN CONTENT AREA
     ═══════════════════════════════════════════════ -->
<main class="md:ml-64 pt-16 md:pt-0 pb-20 md:pb-8 px-4 md:px-8 min-h-screen">
    <div class="max-w-5xl mx-auto py-6">
        <!-- Page content injected here -->
        <div th:replace="${content}"></div>
    </div>
</main>

<!-- ═══════════════════════════════════════════════
     MOBILE BOTTOM NAV (hidden on desktop)
     ═══════════════════════════════════════════════ -->
<nav class="bottom-nav md:hidden" sec:authorize="isAuthenticated()">
    <a href="/" class="bottom-nav-item" th:classappend="${activeNav == 'home' ? 'bottom-nav-item-active' : ''}">
        <svg class="bottom-nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        <span>Home</span>
    </a>
    <a href="/materials" class="bottom-nav-item" th:classappend="${activeNav == 'materials' ? 'bottom-nav-item-active' : ''}">
        <svg class="bottom-nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg>
        <span>Library</span>
    </a>
    <a href="/materials/new" class="bottom-nav-add">
        <svg class="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    </a>
    <a href="/lists" class="bottom-nav-item" th:classappend="${activeNav == 'lists' ? 'bottom-nav-item-active' : ''}">
        <svg class="bottom-nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
        <span>Lists</span>
    </a>
    <a href="/profile" class="bottom-nav-item" th:classappend="${activeNav == 'profile' ? 'bottom-nav-item-active' : ''}">
        <svg class="bottom-nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        <span>Profile</span>
    </a>
</nav>

</body>
</html>
