<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DanceBook</title>

    <!-- Tailwind CSS (compiled by our Gradle task) -->
    <link th:href="@{/css/output.css}" rel="stylesheet">

    <!-- HTMX (loaded via CDN) -->
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
</head>
<body class="bg-gray-50 text-gray-900 font-sans">

<nav class="bg-indigo-600 border-b border-indigo-700 shadow-sm relative z-50">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex justify-between h-16">
      <div class="flex">
        <div class="flex-shrink-0 flex items-center">
          <a href="/" class="text-white font-extrabold text-xl tracking-wide hover:text-indigo-100 transition">DanceBook 💃</a>
        </div>
        <div class="hidden sm:ml-8 sm:flex sm:space-x-8">
          <a href="/materials" class="border-transparent text-indigo-100 hover:border-indigo-200 hover:text-white inline-flex items-center px-1 pt-1 border-b-2 text-sm font-medium transition">Materials</a>
          <a href="/dance-types" class="border-transparent text-indigo-100 hover:border-indigo-200 hover:text-white inline-flex items-center px-1 pt-1 border-b-2 text-sm font-medium transition">Styles</a>
          <a href="/dance-categories" class="border-transparent text-indigo-100 hover:border-indigo-200 hover:text-white inline-flex items-center px-1 pt-1 border-b-2 text-sm font-medium transition">Categories</a>
        </div>
      </div>
    </div>
  </div>
</nav>

<div class="p-8">
  <!-- This is where other templates will insert their content -->
  <div th:replace="${content}"></div>
</div>

</body>
</html>
