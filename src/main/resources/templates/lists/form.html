<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: html(content=~{::main})}">

<main class="max-w-2xl mx-auto bg-white p-8 rounded-lg shadow-md border border-gray-200 mt-8">
  <div class="mb-6 border-b border-gray-200 pb-4">
    <h1 class="text-3xl font-bold text-indigo-600" th:text="${listId == null ? 'Create New List' : 'Edit List'}">Form Title</h1>
    <p class="text-sm text-gray-500 mt-1">Create a dynamic list that automatically shows materials matching your filters.</p>
  </div>

  <form th:action="${listId == null ? '/lists' : '/lists/' + listId}" 
        th:object="${listRequest}" method="post" class="space-y-6">

    <!-- List Name -->
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">List Name *</label>
      <input type="text" th:field="*{name}" required
             class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-indigo-500 focus:border-indigo-500 shadow-sm"
             placeholder="e.g. Latin Favorites"/>
    </div>

    <!-- Name Search Filter -->
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Name Search Filter</label>
      <input type="text" th:field="*{nameFilter}"
             class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-indigo-500 focus:border-indigo-500 shadow-sm"
             placeholder="e.g. natural turn, basic..."/>
      <p class="mt-1 text-xs text-gray-400">Materials whose name contains this text will be included.</p>
    </div>

    <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
      <!-- Dance Types (multi-select checkboxes) -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">Dance Types</label>
        <div class="max-h-48 overflow-y-auto space-y-1 bg-gray-50 rounded-md border border-gray-200 p-3">
          <label th:each="type : ${danceTypes}" class="flex items-center gap-2 text-sm text-gray-700 hover:bg-white px-2 py-1.5 rounded cursor-pointer transition">
            <input type="checkbox" name="danceTypeIds" th:value="${type.id}"
                   th:checked="${listRequest.danceTypeIds.contains(type.id)}"
                   class="rounded border-gray-300 text-indigo-600 focus:ring-indigo-500"/>
            <span th:text="${type.name}">Type</span>
          </label>
          <p th:if="${#lists.isEmpty(danceTypes)}" class="text-xs text-gray-400 italic">No dance types available</p>
        </div>
        <p class="mt-1 text-xs text-gray-400">Leave empty to include all types.</p>
      </div>

      <!-- Categories (multi-select checkboxes) -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">Categories</label>
        <div class="max-h-48 overflow-y-auto space-y-1 bg-gray-50 rounded-md border border-gray-200 p-3">
          <label th:each="cat : ${danceCategories}" class="flex items-center gap-2 text-sm text-gray-700 hover:bg-white px-2 py-1.5 rounded cursor-pointer transition">
            <input type="checkbox" name="danceCategoryIds" th:value="${cat.id}"
                   th:checked="${listRequest.danceCategoryIds.contains(cat.id)}"
                   class="rounded border-gray-300 text-indigo-600 focus:ring-indigo-500"/>
            <span th:text="${cat.name}">Category</span>
          </label>
          <p th:if="${#lists.isEmpty(danceCategories)}" class="text-xs text-gray-400 italic">No categories available</p>
        </div>
        <p class="mt-1 text-xs text-gray-400">Leave empty to include all categories.</p>
      </div>
    </div>

    <!-- Min Rating -->
    <div class="sm:w-1/2">
      <label class="block text-sm font-medium text-gray-700 mb-1">Minimum Rating</label>
      <select th:field="*{minRating}" class="w-full px-4 py-2 border border-gray-300 rounded-md bg-white shadow-sm focus:ring-indigo-500 focus:border-indigo-500">
        <option value="">Any Rating</option>
        <option value="5">5 Stars</option>
        <option value="4">4+ Stars</option>
        <option value="3">3+ Stars</option>
        <option value="2">2+ Stars</option>
        <option value="1">1+ Star</option>
      </select>
    </div>

    <!-- Visibility -->
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-2">Visibility</label>
      <div class="flex items-center gap-6">
        <label class="flex items-center gap-2 text-sm text-gray-700 cursor-pointer">
          <input type="radio" th:field="*{isPublic}" value="true"
                 class="text-indigo-600 focus:ring-indigo-500"/>
          <span>🌍 Public <span class="text-gray-400">(visible to everyone)</span></span>
        </label>
        <label class="flex items-center gap-2 text-sm text-gray-700 cursor-pointer">
          <input type="radio" th:field="*{isPublic}" value="false"
                 class="text-indigo-600 focus:ring-indigo-500"/>
          <span>🔒 Private <span class="text-gray-400">(only you)</span></span>
        </label>
      </div>
    </div>

    <div class="flex justify-end space-x-3 pt-6 border-t border-gray-200">
      <a href="/materials" class="px-4 py-2 border border-gray-300 rounded-md text-gray-700 hover:bg-gray-50 font-medium transition">
        Cancel
      </a>
      <button type="submit" class="px-4 py-2 bg-indigo-600 text-white rounded-md hover:bg-indigo-700 font-medium transition shadow-sm">
        Save List
      </button>
    </div>
  </form>
</main>
</html>
