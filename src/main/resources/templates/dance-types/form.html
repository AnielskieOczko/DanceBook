<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: html(content=~{::section})}">

<section th:with="activeNav='dance-categories'" class="max-w-2xl mx-auto py-12">

    <div class="mb-8 pb-6 border-b border-neutral-100">
        <h1 class="text-3xl font-headline-lg text-on-surface mb-2" th:text="${danceTypeId == null ? 'New Dance Style' : 'Edit Dance Style'}">Form Title</h1>
        <p class="text-on-surface-variant font-body-md">Define a specific dance style and assign it to a category.</p>
    </div>

    <form th:action="${danceTypeId == null ? '/dance-types' : '/dance-types/' + danceTypeId}"
          th:object="${danceType}" method="post" class="card p-8 shadow-ambient">

        <div class="space-y-6">
            <div>
                <label for="typeName" class="form-label">Style Name *</label>
                <input id="typeName" type="text" th:field="*{name}" required 
                       class="form-input"
                       th:classappend="${#fields.hasErrors('name')} ? 'border-danger ring-1 ring-danger' : ''"
                       placeholder="e.g. Waltz, Tango, Foxtrot...">
                <p th:if="${#fields.hasErrors('name')}" th:errors="*{name}" class="form-error"></p>
            </div>

            <div>
                <label for="categoryId" class="form-label">Category *</label>
                <select id="categoryId" th:field="*{categoryId}" required 
                        class="form-select"
                        th:classappend="${#fields.hasErrors('categoryId')} ? 'border-danger ring-1 ring-danger' : ''">
                    <option value="">-- Select Category --</option>
                    <option th:each="cat : ${danceCategories}" th:value="${cat.id}" th:text="${cat.name}"></option>
                </select>
                <p th:if="${#fields.hasErrors('categoryId')}" th:errors="*{categoryId}" class="form-error"></p>
            </div>
        </div>

        <div class="flex justify-end gap-4 mt-10 pt-6 border-t border-border">
            <a href="/dance-categories" class="btn-outline">Cancel</a>
            <button type="submit" class="btn-primary">Save Style</button>
        </div>
    </form>

</section>
</html>
