<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: html(content=~{::main})}">

<main class="max-w-4xl mx-auto bg-white p-6 rounded-lg shadow-md border border-gray-200 mt-8">
  <div class="flex justify-between items-center mb-6">
    <h1 class="text-3xl font-bold text-indigo-600">Dance Categories</h1>
    <a href="/dance-categories/new" class="bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2 px-4 rounded transition shadow-sm">
      + New Category
    </a>
  </div>

  <div class="overflow-x-auto">
    <table class="w-full text-left border-collapse">
      <thead>
      <tr class="bg-gray-100 border-b border-gray-200 text-gray-700">
        <th class="p-3 font-semibold rounded-tl-lg">Name</th>
        <th class="p-3 font-semibold">Predefined</th>
        <th class="p-3 font-semibold text-right rounded-tr-lg">Actions</th>
      </tr>
      </thead>
      <tbody>
      <tr th:each="category : ${danceCategories}" class="border-b border-gray-100 hover:bg-gray-50 transition">
        <td class="p-3 font-medium text-gray-900" th:text="${category.name}">Name</td>
        <td class="p-3">
          <span th:if="${category.predefined}" class="bg-emerald-100 text-emerald-800 text-xs px-2 py-1 rounded">Yes</span>
          <span th:if="${!category.predefined}" class="text-gray-400 text-sm">No</span>
        </td>
        <td class="p-3 text-right">
          <div th:if="${!category.predefined}">
            <a th:href="@{/dance-categories/{id}/edit(id=${category.id})}" class="text-indigo-600 hover:text-indigo-800 font-medium mr-3 transition">Edit</a>
            <form th:action="@{/dance-categories/{id}/delete(id=${category.id})}" method="post" class="inline" data-confirm="Are you sure you want to delete this category?">
              <button type="submit" class="text-red-500 hover:text-red-700 font-medium transition cursor-pointer">Delete</button>
            </form>
          </div>
          <div th:if="${category.predefined}" class="text-gray-400 italic text-sm">System Default</div>
        </td>
      </tr>
      <tr th:if="${#lists.isEmpty(danceCategories)}">
        <td colspan="3" class="p-8 text-center text-gray-500 bg-gray-50 italic">
          No categories found.
        </td>
      </tr>
      </tbody>
    </table>
  </div>
</main>
</html>
