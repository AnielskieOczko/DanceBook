<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:fragment="html(content)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    <title th:text="${pageTitle != null ? pageTitle + ' · CHOREO' : 'CHOREO'}">CHOREO</title>

    <!-- Google Fonts & Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">

    <!-- Tailwind CSS -->
    <link th:href="@{/css/output.css}" rel="stylesheet">

    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script th:src="@{/js/main.js}"></script>
</head>
<body class="bg-background text-on-background font-body-md antialiased min-h-screen pb-24 md:pb-0">

<!-- ═══════════════════════════════════════════════
     TOP APP BAR (Sticky)
     ═══════════════════════════════════════════════ -->
<header class="bg-surface sticky top-0 z-50 transition-all duration-300 shadow-ambient" sec:authorize="isAuthenticated()">
    <div class="flex justify-between items-center w-full px-6 py-4 max-w-7xl mx-auto">
        <!-- Brand -->
        <a href="/" class="flex items-center">
            <h1 class="text-on-surface font-display-lg text-[20px] tracking-[0.2em] font-semibold uppercase">CHOREO</h1>
        </a>

        <!-- Desktop Navigation -->
        <nav class="hidden md:flex items-center gap-8">
            <a href="/" class="font-body-md font-medium transition-all duration-200"
               th:classappend="${activeNav == 'home' ? 'text-on-surface opacity-100' : 'text-outline hover:text-on-surface opacity-70'}">Dashboard</a>
            <a href="/materials" class="font-body-md font-medium transition-all duration-200"
               th:classappend="${activeNav == 'materials' ? 'text-on-surface opacity-100' : 'text-outline hover:text-on-surface opacity-70'}">Library</a>
            <a href="/lists" class="font-body-md font-medium transition-all duration-200"
               th:classappend="${activeNav == 'lists' ? 'text-on-surface opacity-100' : 'text-outline hover:text-on-surface opacity-70'}">Collections</a>
            <a href="/profile" class="font-body-md font-medium transition-all duration-200"
               th:classappend="${activeNav == 'profile' ? 'text-on-surface opacity-100' : 'text-outline hover:text-on-surface opacity-70'}">Profile</a>
        </nav>

        <!-- Trailing Icons -->
        <div class="flex items-center gap-4">
            <a sec:authorize="hasRole('ADMIN')" href="/admin" class="hidden md:flex items-center text-outline hover:text-on-surface transition-colors" title="Admin Dashboard">
                <span class="material-symbols-outlined">settings</span>
            </a>

            <!-- Notification Bell -->
            <div class="relative" id="notification-bell-wrapper">
                <button id="notification-bell"
                        class="relative flex items-center text-outline hover:text-on-surface transition-colors"
                        hx-get="/notifications"
                        hx-target="#notification-dropdown"
                        hx-swap="innerHTML"
                        title="Notifications">
                    <span class="material-symbols-outlined">notifications</span>
                    <!-- Badge (HTMX polling) -->
                    <span id="notification-badge"
                          hx-get="/notifications/count"
                          hx-trigger="load, every 30s"
                          hx-swap="innerHTML">
                        <span th:if="${unreadNotificationCount != null && unreadNotificationCount > 0}"
                              class="absolute -top-1 -right-1 min-w-[18px] h-[18px] flex items-center justify-center bg-error text-on-error text-[10px] font-bold rounded-full px-1"
                              th:text="${unreadNotificationCount}">3</span>
                    </span>
                </button>
                <!-- Dropdown Panel (filled by HTMX) -->
                <div id="notification-dropdown" class="hidden absolute right-0 top-full mt-2 w-80 md:w-96 z-50"></div>
            </div>

            <div class="w-10 h-10 rounded-full bg-surface-variant overflow-hidden border border-outline-variant flex-shrink-0 cursor-pointer hover:shadow-ambient transition-shadow">
                <a href="/profile">
                    <div class="w-full h-full flex items-center justify-center bg-primary-container text-on-primary-container font-bold">
                        <span th:text="${currentUser != null && currentUser.displayName != null ? currentUser.displayName.substring(0,1) : 'U'}">U</span>
                    </div>
                </a>
            </div>
        </div>
    </div>
</header>

<!-- ═══════════════════════════════════════════════
     MAIN CONTENT AREA
     ═══════════════════════════════════════════════ -->
<main class="max-w-7xl mx-auto px-6 py-lg md:py-xl">
    <!-- Page content injected here -->
    <div th:replace="${content}"></div>
</main>

<!-- ═══════════════════════════════════════════════
     BOTTOM NAV BAR (Mobile Only)
     ═══════════════════════════════════════════════ -->
<nav class="md:hidden fixed bottom-0 left-0 w-full flex justify-around items-center px-4 py-3 pb-safe bg-surface shadow-ambient rounded-t-xl z-50" sec:authorize="isAuthenticated()">
    <!-- Dashboard -->
    <a href="/" class="flex flex-col items-center justify-center transition-all duration-150"
       th:classappend="${activeNav == 'home' ? 'text-on-surface bottom-nav-item-active' : 'text-outline'}">
        <span class="material-symbols-outlined" th:style="${activeNav == 'home' ? 'font-variation-settings: &quot;FILL&quot; 1;' : ''}">grid_view</span>
        <span class="font-label-sm text-[11px] font-medium uppercase tracking-wider mt-1">Dashboard</span>
    </a>
    <!-- Library -->
    <a href="/materials" class="flex flex-col items-center justify-center transition-all duration-150"
       th:classappend="${activeNav == 'materials' ? 'text-on-surface bottom-nav-item-active' : 'text-outline'}">
        <span class="material-symbols-outlined" th:classappend="${activeNav == 'materials' ? 'icon-filled' : ''}">subscriptions</span>
        <span class="font-label-sm text-[11px] font-medium uppercase tracking-wider mt-1">Library</span>
    </a>
    <!-- Collections -->
    <a href="/lists" class="flex flex-col items-center justify-center transition-all duration-150"
       th:classappend="${activeNav == 'lists' ? 'text-on-surface bottom-nav-item-active' : 'text-outline'}">
        <span class="material-symbols-outlined" th:style="${activeNav == 'lists' ? 'font-variation-settings: &quot;FILL&quot; 1;' : ''}">layers</span>
        <span class="font-label-sm text-[11px] font-medium uppercase tracking-wider mt-1">Collections</span>
    </a>
    <!-- Profile -->
    <a href="/profile" class="flex flex-col items-center justify-center transition-all duration-150"
       th:classappend="${activeNav == 'profile' ? 'text-on-surface bottom-nav-item-active' : 'text-outline'}">
        <span class="material-symbols-outlined" th:classappend="${activeNav == 'profile' ? 'icon-filled' : ''}">person</span>
        <span class="font-label-sm text-[11px] font-medium uppercase tracking-wider mt-1">Profile</span>
    </a>
</nav>

</body>
</html>
