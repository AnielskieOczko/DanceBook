<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: html(content=~{::section})}">

<section th:with="activeNav='materials'">

    <!-- Page Header -->
    <div class="page-header">
        <h1 class="page-title" th:text="${materialId == null ? 'New Material' : 'Edit Material'}">Form Title</h1>
        <p class="page-subtitle" th:text="${materialId == null ? 'Add a new dance material to your library' : 'Update this material'}">Subtitle</p>
    </div>

    <form th:action="${materialId == null ? '/materials' : '/materials/' + materialId}"
          th:object="${material}" method="post" class="card p-6 md:p-8 space-y-6">

        <!-- Hidden version field for optimistic locking -->
        <input type="hidden" th:field="*{version}"/>

        <!-- Name -->
        <div>
            <label for="name" class="form-label">Name *</label>
            <input id="name" type="text" th:field="*{name}" required
                   class="form-input"
                   th:classappend="${#fields.hasErrors('name')} ? 'border-danger ring-1 ring-danger' : ''"
                   placeholder="e.g. Waltz Natural Turn">
            <p th:if="${#fields.hasErrors('name')}" th:errors="*{name}" class="form-error"></p>
        </div>

        <!-- Description -->
        <div>
            <label for="description" class="form-label">Description</label>
            <textarea id="description" th:field="*{description}" rows="3" class="form-textarea"
                      placeholder="Brief notes about this material..."></textarea>
        </div>

        <!-- Dance Category & Type (two columns, Category first) -->
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <div>
                <label for="danceCategoryId" class="form-label">Category</label>
                <select id="danceCategoryId" th:field="*{danceCategoryId}" class="form-select"
                        hx-get="/materials/dance-types-options"
                        hx-target="#danceTypeId"
                        hx-trigger="change">
                    <option value="">-- Select Category --</option>
                    <option th:each="cat : ${danceCategories}" th:value="${cat.id}" th:text="${cat.name}"></option>
                </select>
            </div>
            <div>
                <label for="danceTypeId" class="form-label">Dance Style</label>
                <select id="danceTypeId" th:field="*{danceTypeId}" class="form-select">
                    <th:block th:fragment="danceTypeOptions">
                        <option value="">-- Select Style --</option>
                        <option th:each="type : ${danceTypes}" th:value="${type.id}" th:text="${type.name}"></option>
                    </th:block>
                </select>
            </div>
        </div>

        <!-- Rating -->
        <div class="max-w-[200px]">
            <label for="rating" class="form-label">Rating (1–5)</label>
            <input id="rating" type="number" th:field="*{rating}" min="1" max="5" class="form-input" placeholder="3">
            <p th:if="${#fields.hasErrors('rating')}" th:errors="*{rating}" class="form-error"></p>
        </div>

        <div class="divider"></div>

        <!-- Links Section -->
        <div class="space-y-4">
            <div>
                <label for="videoLink" class="form-label">Video Link</label>
                <input id="videoLink" type="url" th:field="*{videoLink}" class="form-input"
                       th:classappend="${#fields.hasErrors('videoLink')} ? 'border-danger ring-1 ring-danger' : ''"
                       placeholder="https://youtube.com/watch?v=...">
                <p class="form-hint">YouTube, Vimeo, or any external link</p>
                <p th:if="${#fields.hasErrors('videoLink')}" th:errors="*{videoLink}" class="form-error"></p>
            </div>
            <div>
                <label for="sourceLink" class="form-label">Source Link</label>
                <input id="sourceLink" type="url" th:field="*{sourceLink}" class="form-input"
                       th:classappend="${#fields.hasErrors('sourceLink')} ? 'border-danger ring-1 ring-danger' : ''"
                       placeholder="https://facebook.com/...">
                <p class="form-hint">Original source (Facebook, Instagram, etc.)</p>
                <p th:if="${#fields.hasErrors('sourceLink')}" th:errors="*{sourceLink}" class="form-error"></p>
            </div>
        </div>

        <div class="divider"></div>

        <!-- Google Drive Upload Section -->
        <div class="bg-gradient-to-br from-primary-soft/30 to-surface-warm rounded-card border border-border p-5">
            <label class="form-label font-bold flex items-center gap-2 mb-3">
                <span class="material-symbols-outlined text-primary text-[20px]">cloud_upload</span>
                Upload Video to Google Drive
            </label>

            <!-- Hidden driveFileId field (auto-filled by JS) -->
            <input type="hidden" th:field="*{driveFileId}" id="driveFileId"/>

            <!-- Current video indicator -->
            <div id="currentVideo" class="hidden mb-3 bg-surface rounded-button border border-success p-3 flex items-center justify-between gap-3">
                <div class="flex items-center gap-3">
                    <span class="material-symbols-outlined text-success text-[20px] flex-shrink-0">check_circle</span>
                    <span class="text-sm text-text-primary">Video linked: <strong id="currentVideoId" class="text-primary font-mono text-xs"></strong></span>
                </div>
                <button type="button" id="removeVideoBtn" class="btn btn-sm bg-danger text-white hover:bg-red-700 focus:ring-danger">
                    Remove Video
                </button>
            </div>

            <!-- File input + upload button -->
            <div class="flex items-center gap-3">
                <label for="videoFile" class="flex-1 cursor-pointer">
                    <div id="fileLabel" class="w-full px-4 py-3 border-2 border-dashed border-border rounded-button text-center text-sm text-text-secondary hover:border-primary hover:bg-surface transition">
                        Click to select a video file...
                    </div>
                    <input type="file" id="videoFile" accept="video/*" class="hidden"/>
                </label>
                <button type="button" id="uploadBtn" disabled
                        class="btn-primary px-5 py-3 disabled:opacity-40 disabled:cursor-not-allowed">
                    Upload
                </button>
            </div>

            <!-- Progress bar -->
            <div id="progressContainer" class="hidden mt-3">
                <div class="flex justify-between text-xs text-text-secondary mb-1">
                    <span id="progressLabel">Uploading...</span>
                    <span id="progressPercent">0%</span>
                </div>
                <div class="w-full bg-surface-warm rounded-pill h-2.5">
                    <div id="progressBar" class="bg-primary h-2.5 rounded-pill transition-all duration-300" style="width: 0%"></div>
                </div>
            </div>

            <!-- Status message -->
            <div id="uploadStatus" class="hidden mt-3 text-sm rounded-button p-3"></div>

            <!-- Manual ID fallback -->
            <details class="mt-3">
                <summary class="text-xs text-text-secondary cursor-pointer hover:text-text-primary">Or enter Drive File ID manually</summary>
                <input type="text" id="manualDriveId" placeholder="e.g. 1FhnSuC88na_OrlBbgIzCyK8r4U1Jg_pb"
                       class="mt-2 form-input text-sm"/>
            </details>
        </div>

        <!-- Form Actions -->
        <div class="flex justify-end gap-3 pt-6 border-t border-border">
            <a href="/materials" class="btn-outline">Cancel</a>
            <button type="submit" id="saveBtn" class="btn-primary">
                <span class="material-symbols-outlined text-[20px]">save</span>
                Save Material
            </button>
        </div>
    </form>

    <script th:src="@{/js/drive-upload.js}"></script>
    <script th:src="@{/js/drive-form.js}"></script>

</section>
</html>
