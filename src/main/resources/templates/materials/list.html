<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: html(content=~{::section})}">

<section th:with="activeNav='materials'" class="space-y-lg">

    <!-- Search & Filter Section -->
    <section>
        <form id="filterForm" th:hx-get="@{/materials}" hx-target="#materials-grid" hx-swap="outerHTML" hx-trigger="submit, change from:input[type='checkbox']" hx-push-url="false">
            <div class="relative max-w-3xl mb-md group">
                <span class="material-symbols-outlined absolute left-0 top-1/2 -translate-y-1/2 text-on-surface-variant pointer-events-none group-focus-within:text-primary transition-colors">search</span>
                <input type="text" name="nameSearch" th:value="${selectedNameSearch}"
                       class="w-full bg-transparent border-0 border-b border-outline-variant focus:ring-0 focus:border-primary pb-sm pl-[36px] text-body-lg font-body-lg text-on-surface placeholder:text-on-surface-variant transition-colors outline-none"
                       placeholder="Search choreography, styles, or keywords..."
                       hx-trigger="keyup changed delay:300ms" th:hx-get="@{/materials}" hx-target="#materials-grid" hx-swap="outerHTML" hx-include="#filterForm">
            </div>

            <div class="flex overflow-x-auto gap-sm scrollbar-hide py-2">
                <!-- All Materials Pill -->
                <label class="cursor-pointer">
                    <input type="radio" name="categoryIds" value="" class="hidden peer"
                           th:checked="${selectedCategoryIds == null || #lists.isEmpty(selectedCategoryIds)}"
                           th:hx-get="@{/materials}" hx-target="#materials-grid" hx-swap="outerHTML" hx-include="#filterForm">
                    <span class="px-4 py-2 rounded-full whitespace-nowrap text-label-sm font-label-sm transition-all peer-checked:bg-primary-fixed peer-checked:text-on-primary-fixed bg-surface-container text-on-surface hover:bg-surface-container-high">
                        All Materials
                    </span>
                </label>

                <!-- Category Pills -->
                <label th:each="c : ${danceCategories}" class="cursor-pointer">
                    <input type="radio" name="categoryIds" th:value="${c.id}" class="hidden peer"
                           th:checked="${selectedCategoryIds != null && #lists.contains(selectedCategoryIds, c.id)}"
                           th:hx-get="@{/materials}" hx-target="#materials-grid" hx-swap="outerHTML" hx-include="#filterForm">
                    <span class="px-4 py-2 rounded-full whitespace-nowrap text-label-sm font-label-sm transition-all peer-checked:bg-primary-fixed peer-checked:text-on-primary-fixed bg-surface-container text-on-surface hover:bg-surface-container-high"
                          th:text="${c.name}">Category</span>
                </label>
            </div>
        </form>
    </section>

    <!-- Materials Grid (HTMX swappable) -->
    <div th:fragment="materialsTable" id="materials-grid" class="space-y-gutter">
        <div th:if="${#lists.isEmpty(materials)}" class="empty-state">
            <div class="empty-state-icon">
                <span class="material-symbols-outlined text-4xl text-outline">search_off</span>
            </div>
            <h3 class="empty-state-title">No movements found</h3>
            <p class="empty-state-text">Your library is quiet. Adjust your filters or add a new material to begin.</p>
            <a href="/materials/new" class="btn-primary">Import first material</a>
        </div>

        <div th:if="${!#lists.isEmpty(materials)}" class="grid grid-cols-1 sm:grid-cols-2 gap-6 md:gap-8">
            <article th:each="m : ${materials}"
                     th:with="catName=${m.danceType != null && m.danceType.category != null ? m.danceType.category.name : 'Unknown'},
                              catImage=${m.danceType != null && m.danceType.category != null ? m.danceType.category.imageFilename : null},
                              imgSrc=${catImage != null ? '/uploads/categories/' + catImage : '/images/categories/placeholder.png'}"
                     class="relative group border border-[#EAEAEA] bg-white rounded-lg flex flex-col transition-all duration-300 hover:shadow-[0px_4px_20px_rgba(45,45,45,0.05)] hover:-translate-y-0.5 hover:z-10 focus-within:z-10">
                
                <a th:href="@{/materials/{id}(id=${m.id})}" class="absolute inset-0 z-0 rounded-lg"><span class="sr-only" th:text="'View ' + ${m.name}">View Material</span></a>
                
                <div class="flex flex-row w-full relative z-0 pointer-events-none">
                    <div class="w-1/3 aspect-square relative overflow-hidden rounded-tl-lg bg-surface-container-high block z-0">
                        <img th:src="${imgSrc}" th:alt="${catName}" class="w-full h-full object-cover grayscale opacity-90 group-hover:grayscale-0 transition-all duration-500" />
                        <div class="absolute inset-0 bg-black/10 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity duration-300">
                            <span class="material-symbols-outlined text-white text-3xl font-light" style="font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;">play_arrow</span>
                        </div>
                    </div>
                    <div class="w-2/3 p-4 flex flex-col justify-between relative z-10 bg-white rounded-tr-lg">
                        <div>
                            <div class="flex items-start justify-between mb-2">
                                <div class="flex items-center gap-2 relative z-20 pointer-events-auto">
                                    <span th:text="${m.danceType != null ? m.danceType.name : 'Uncategorized'}" class="bg-[#F2F2F2] text-on-surface-variant px-2 py-0.5 rounded-sm text-[10px] font-label-sm uppercase tracking-wider">Style</span>
                                    <span class="text-[11px] text-on-surface-variant font-body-sm flex items-center gap-1 opacity-70"><span class="material-symbols-outlined text-[12px]">calendar_today</span> <span th:text="${#temporals.format(m.createdAt, 'dd MMM yyyy')}">Date</span></span>
                                </div>
                                <div class="relative z-20 group/menu -mt-1 -mr-2 pointer-events-auto" tabindex="0">
                                    <button type="button" class="w-8 h-8 rounded-full hover:bg-surface-variant flex items-center justify-center text-on-surface-variant transition-colors">
                                        <span class="material-symbols-outlined text-[20px]">more_vert</span>
                                    </button>
                                    <div class="absolute right-0 top-full w-36 bg-surface rounded-lg shadow-lg border border-outline-variant py-1 hidden group-focus-within/menu:block group-hover/menu:block z-50">
                                        <a th:href="@{/materials/{id}(id=${m.id})}" class="flex items-center gap-2 px-4 py-2 text-body-md text-on-surface hover:bg-surface-variant transition-colors">
                                            <span class="material-symbols-outlined text-[18px]">open_in_new</span> Open
                                        </a>
                                        <a th:href="@{/materials/{id}/edit(id=${m.id})}" class="flex items-center gap-2 px-4 py-2 text-body-md text-on-surface hover:bg-surface-variant transition-colors">
                                            <span class="material-symbols-outlined text-[18px]">edit</span> Edit
                                        </a>
                                        <a th:href="${m.sourceLink != null && !m.sourceLink.isEmpty()} ? ${m.sourceLink} : @{/materials/{id}(id=${m.id})}" 
                                           th:target="${m.sourceLink != null && !m.sourceLink.isEmpty()} ? '_blank' : '_self'" 
                                           class="flex items-center gap-2 px-4 py-2 text-body-md text-on-surface hover:bg-surface-variant transition-colors">
                                            <span class="material-symbols-outlined text-[18px]">smart_display</span> Watch
                                        </a>
                                    </div>
                                </div>
                            </div>
                            <h3 class="font-headline-md leading-tight text-on-surface mb-1 group-hover:text-primary transition-colors text-[15px] leading-[1.3] whitespace-normal pr-4" th:text="${m.name}">Material Name</h3>
                            
                            <div class="flex items-center gap-3 mt-3 text-xs text-on-surface-variant font-body-sm">
                                <span class="flex items-center gap-1"><span class="material-symbols-outlined text-[14px]">format_list_numbered</span> <span th:text="${#lists.size(m.figures)} + ' Figures'">0 Figures</span></span>
                            </div>
                        </div>
                        <div th:if="${m.description}" class="mt-auto pt-3 relative z-20 pointer-events-auto">
                             <button type="button" class="js-expand-btn text-primary flex items-center gap-1 text-sm font-label-md transition-colors hover:text-primary-container focus:outline-none">
                                 <span class="btn-text pointer-events-none">View description</span>
                                 <span class="material-symbols-outlined transition-transform duration-300 icon-expand pointer-events-none">expand_more</span>
                             </button>
                        </div>
                    </div>
                </div>
                
                <div th:if="${m.description}" class="expandable-content max-h-0 overflow-hidden transition-all duration-300 ease-in-out w-full relative z-20 pointer-events-none rounded-b-lg">
                     <div class="px-4 pb-4 pt-1 border-t border-outline-variant/30 mt-2 mx-4 pointer-events-auto bg-white">
                         <p class="font-body-md text-sm text-on-surface-variant mt-3 whitespace-pre-wrap leading-relaxed relative z-20" th:text="${m.description}">Description</p>
                     </div>
                </div>
            </article>
        </div>
    </div>

</section>
</html>
